<style>
/* ============================================================
   NM PLOTTER — iPhone layout demo shell
   Chrome-only. Placeholder map. No app logic.

   GEOMETRY  = measured from ForeFlight iPhone screenshots
               (1125x2436 @3x -> 375x812pt; verified against the
               iOS home indicator at exactly 134.0 x 5.0 pt).
   STYLING   = NM Plotter palette, type and component language.
               No ForeFlight colours or fonts are used.

   Every geometric constant is a CSS variable in :root so values
   can be tuned in one place.
   ============================================================ */

:root{
  /* ---- NM Plotter palette (verbatim from index.html) ---- */
  --bg:#0a0e13;
  --bg-2:#0f141b;
  --panel:#0d1219;
  --inset:#12191f;
  --border:#1a2330;
  --border-strong:#2a3744;
  --text:#dce6f0;
  --text-2:#b8c5d1;
  --text-dim:#8a9bb0;
  --text-muted:#7d93a8;
  --text-faint:#5f7186;
  --text-fainter:#46566a;
  --accent:#ffb020;         /* control is ON  (ForeFlight #009BE1) */
  --accent-2:#7fb3d5;       /* row selected / tappable (ForeFlight #4498DB) */
  --good:#34d399;
  --bad:#f0506e;
  --route:#f0a500;
  --magenta:#e0479e;
  --navaid:#c792ea;
  --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* ---- Measured geometry ---- */
  --gut:6.5px;              /* gap between every button AND every row */
  --edge:16px;              /* toolbar / search side margin */
  --pedge:6px;              /* panel + rail side margin */
  --mod-a:32px;             /* dense chrome row height */
  --mod-b:44px;             /* touch-primary control height */
  --top-pad:12px;           /* below the status-bar safe area */
  --gps-gap:26px;           /* isolating gap before the GPS button */
  --radius:6px;
  --radius-sm:5px;          /* optical match to --radius on shorter elements */
  --tabbar:58px;            /* tab-bar content height, excl. home inset */

  /* ---- Type scale ----
     Five UI sizes, nothing between them. Plus two declared
     exceptions: --t-in is 16px because iOS force-zooms any input
     below that, and --t-disp is for result numbers you read at
     arm's length. Icon glyphs (x, +, -) are not type. */
  --t-2xs:9px;
  --t-xs:10px;
  --t-sm:13px;
  --t-md:15px;
  --t-lg:17px;
  --t-in:16px;
  --t-disp:30px;

  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sab-trim:12px;                                    /* reclaimed from the home-indicator band */
  --sabp:max(calc(var(--sab) - var(--sab-trim)), 8px);/* bottom padding used everywhere */
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:var(--t-md);
  -webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:0;padding:0;margin:0;cursor:pointer}

.app{
  height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ============================================================
   TOP CHROME
   Background runs to y=0 behind the status bar; the first
   interactive pixel is at safe-area-top + 12px.
   ============================================================ */
.chrome{
  flex:0 0 auto;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:calc(var(--sat) + var(--top-pad)) var(--edge) var(--gut);
}
.toolbar{display:flex;align-items:center;gap:var(--gut)}
.tb{
  flex:1 1 0;height:var(--mod-a);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-2);border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text-2);
}
.tb:active{background:var(--inset)}
.tb.on{background:var(--accent);border-color:var(--accent);color:#0a0e13}
.tb.gps{margin-left:calc(var(--gps-gap) - var(--gut))}
.tb svg{width:18px;height:18px;display:block}
.tb .txt{font-size:var(--t-sm);font-weight:700;letter-spacing:.02em}

.searchrow{margin-top:var(--gut)}
.search{
  height:var(--mod-a);width:100%;
  display:flex;align-items:center;gap:8px;
  padding:0 6px 0 10px;
  background:var(--inset);border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text-faint);
}
.search.on{border-color:var(--accent)}
.search svg{width:15px;height:15px;flex:0 0 auto}
.search input{
  flex:1 1 auto;min-width:0;height:100%;
  background:none;border:0;outline:none;padding:0;
  color:var(--text);font-family:var(--sans);font-size:var(--t-in);
  -webkit-appearance:none;
}
.search input::placeholder{color:var(--text-faint);font-size:var(--t-sm)}
.search .sx{flex:0 0 auto;width:24px;height:24px;display:none;
  align-items:center;justify-content:center;font-size:18px;color:var(--text-muted)}
.search .sx.on{display:flex}

/* ---- search results panel ---- */
.spanel{
  position:fixed;left:0;right:0;z-index:950;display:none;
  flex-direction:column;
  background:var(--panel);
  border-bottom:1px solid var(--border-strong);
  box-shadow:0 12px 26px rgba(0,0,0,.55);
}
.spanel.on{display:flex}
.slistw{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ctabs.off{display:none}
/* ---- Settings ---- */
.setv{
  position:fixed;inset:0;z-index:1100;background:var(--bg);display:none;
  flex-direction:column;
  padding-top:calc(var(--sat) + var(--top-pad));padding-bottom:var(--sabp);
}
.setv.on{display:flex}
.setrow{display:flex;align-items:center;gap:10px;padding:11px 0;
  border-bottom:1px solid var(--border);font-size:var(--t-sm)}
.setrow .lb{flex:1 1 auto;min-width:0;color:var(--text)}
.setrow .lb small{display:block;font-size:var(--t-2xs);color:var(--text-fainter);margin-top:2px}
.setrow .fin{width:96px;flex:0 0 96px}
.setrow .fseg{flex:0 0 auto}
.setrow .fseg button{flex:0 0 auto;padding:0 10px;height:28px}
.swi{flex:0 0 44px;width:44px;height:26px;border-radius:13px;background:var(--bg-2);
  border:1px solid var(--border-strong);position:relative;transition:background .15s}
.swi i{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:10px;
  background:var(--text-faint);transition:transform .15s,background .15s}
.swi.on{background:rgba(255,176,32,.2);border-color:var(--accent)}
.swi.on i{transform:translateX(18px);background:var(--accent)}
.setgo{width:100%;height:var(--mod-b);display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);font-size:var(--t-sm);color:var(--text);text-align:left}
.setgo .ch{margin-left:auto;color:var(--text-fainter)}
.mkflash{
  position:absolute;transform:translate(-50%,-50%);z-index:15;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.mkflash i{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);
  background:rgba(255,176,32,.25);animation:mkp 1.1s ease-out infinite}
.mkflash b{font-family:var(--mono);font-size:var(--t-2xs);font-weight:700;color:var(--accent);
  background:rgba(10,14,19,.85);border-radius:3px;padding:1px 4px;white-space:nowrap}
@keyframes mkp{0%{transform:scale(.7);opacity:1}100%{transform:scale(2.2);opacity:0}}

/* ============================================================
   MAP (placeholder)
   ============================================================ */
.map{
  position:relative;flex:1 1 auto;min-height:0;
  background:
    radial-gradient(120% 90% at 30% 20%, #101821 0%, #0a0e13 70%);
  overflow:hidden;
}
.grat{position:absolute;inset:0;opacity:.5;
  background-image:
    linear-gradient(to right, #17202b 1px, transparent 1px),
    linear-gradient(to bottom, #17202b 1px, transparent 1px);
  background-size:52px 52px;
}
.mapnote{
  position:absolute;left:0;right:0;top:44%;
  text-align:center;font-size:var(--t-sm);
  color:var(--text-fainter);letter-spacing:.12em;text-transform:uppercase;
  pointer-events:none;
}
.fld{position:absolute;transform:translate(-50%,-50%);pointer-events:auto}
.fld i{display:block;width:9px;height:9px;border-radius:50%;
  background:var(--accent-2);margin:0 auto;box-shadow:0 0 0 2px rgba(10,14,19,.9)}
.fld b{display:block;margin-top:3px;font-size:var(--t-xs);font-weight:600;
  color:var(--text-dim);letter-spacing:.04em;white-space:nowrap}
.leg{position:absolute;height:2px;background:var(--route);transform-origin:0 50%;opacity:.9}

/* ---- Left rail --------------------------------------------
   44px lane, 6px off the left edge, bottom-anchored,
   translucent over the map, hairline-separated, grouped.      */
.rail{
  position:absolute;left:var(--pedge);bottom:var(--gut);
  width:var(--mod-b);
  display:flex;flex-direction:column;gap:var(--gut);
  z-index:20;
}
.rgrp{
  display:flex;flex-direction:column;
  background:rgba(13,18,25,.84);
  border:1px solid var(--border-strong);
  border-radius:var(--radius);
  overflow:hidden;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
}
.rb{
  height:var(--mod-b);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:var(--text-2);
}
.rb + .rb{border-top:1px solid var(--border)}
.rb:active{background:var(--inset)}
.rb.on{background:var(--accent);color:#0a0e13}
.rb svg{width:20px;height:20px;display:block}
.rb .lab{font-size:var(--t-xs);font-weight:700;letter-spacing:.05em}
.rb.tall{height:58px}
.rb .tick{font-family:var(--mono);font-size:var(--t-xs);color:var(--text-dim)}
.rb.on .tick{color:#0a0e13}

.rail.open{top:27px;bottom:auto}
.rail.open .collapsed-only{display:none}
.rail:not(.open) .open-only{display:none}

/* ============================================================
   ACTIVITY BAR — 44px, 5 columns, pages horizontally
   ============================================================ */
.acty{
  flex:0 0 auto;height:var(--mod-b);
  display:flex;align-items:stretch;
  background:var(--bg);border-top:1px solid var(--border);
}
.acty.off{display:none}
.acty .pages{flex:1 1 auto;display:flex;overflow:hidden}
.acty .page{flex:0 0 100%;display:flex;transition:transform .18s ease}
.acol{
  flex:1 1 0;min-width:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  padding:0 2px;
}
.acol .k{font-size:var(--t-xs);font-weight:600;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.acol .v{font-family:var(--mono);font-size:var(--t-md);font-weight:700;color:var(--text);
  white-space:nowrap}
.acol .v.dash{color:var(--text-fainter);letter-spacing:.08em}
.apage{
  flex:0 0 22px;display:flex;align-items:center;justify-content:center;
  color:var(--text-faint);border-left:1px solid var(--border);
}
.apage svg{width:12px;height:12px}

/* ============================================================
   TAB BAR — 3 items, selected = filled pill behind the icon
   ============================================================ */
.tabs{
  flex:0 0 auto;position:relative;z-index:850;
  height:calc(var(--tabbar) + var(--sabp));
  padding-bottom:var(--sabp);
  display:flex;
  background:var(--panel);border-top:1px solid var(--border);
}
.tab{
  flex:1 1 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text-muted);
}
.tab .ic{
  width:38px;height:26px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
}
.tab svg{width:21px;height:21px;display:block}
.tab .lab{font-size:var(--t-xs);font-weight:600}
.tab.on{color:var(--text)}
.tab.on .ic{background:var(--accent);color:#0a0e13}

/* ============================================================
   OVERLAYS
   ============================================================ */
.scrim{position:fixed;inset:0;background:rgba(3,5,8,.5);z-index:900;display:none}
.scrim.on{display:block}

/* ---- Popover (Layers): anchored, caret, 1px outline -------- */
.pop{
  position:fixed;z-index:1000;display:none;
  background:var(--panel);
  border:1px solid var(--border-strong);
  border-radius:8px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
  overflow:hidden;
}
.pop.on{display:block}
.pop .caret{
  position:absolute;top:-7px;width:12px;height:12px;
  background:var(--panel);
  border-left:1px solid var(--border-strong);
  border-top:1px solid var(--border-strong);
  transform:rotate(45deg);
}
.pop2{display:flex;max-height:60vh}
.pcol{flex:1 1 0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pcol + .pcol{border-left:1px solid var(--border)}
.pcol.l{flex:0 0 168px}
.prow{
  height:40px;display:flex;align-items:center;gap:8px;
  padding:0 12px;font-size:var(--t-sm);font-weight:600;color:var(--text-2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.prow + .prow{border-top:1px solid var(--border)}
.prow:active{background:var(--inset)}
.prow.sel{background:var(--accent-2);color:#0a0e13}
.prow .ck{width:14px;flex:0 0 14px;color:var(--accent)}
.prow .ck svg{width:14px;height:14px;display:block}
.psec{
  padding:8px 12px 6px;font-size:var(--t-xs);font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;color:var(--text-fainter);
  border-top:1px solid var(--border);
}

/* ---- Drop-down panel (FPL) --------------------------------
   Fixed under the search row, sized to the space between the
   chrome and the tab bar. Body scrolls; strip + tabs are pinned. */
.drop{
  position:fixed;left:0;right:0;z-index:950;display:none;
  flex-direction:column;
  background:var(--panel);
  border-bottom:1px solid var(--border-strong);
  box-shadow:0 12px 26px rgba(0,0,0,.55);
}
.drop.on{display:flex}
.dbody{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:var(--gut) var(--pedge)}
.drow{display:flex;gap:var(--gut);margin-bottom:var(--gut)}
.dbtn{
  flex:1 1 0;min-width:0;height:var(--mod-a);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);
  font-size:var(--t-sm);font-weight:600;color:var(--text-2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;
}
.dbtn:active{background:var(--inset)}

/* ---- route chips ---- */
.chips{display:flex;flex-wrap:wrap;gap:var(--gut)}
.chip{
  flex:1 1 calc(50% - var(--gut));min-width:0;
  height:var(--mod-a);border-radius:16px;
  display:flex;align-items:center;gap:6px;
  background:var(--inset);border:1px solid var(--border-strong);
  padding:0 10px 0 6px;
}
.chip .ix{
  flex:0 0 18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--text-fainter);
  font-family:var(--mono);font-size:var(--t-2xs);font-weight:700;
}
.chip .nm{flex:1 1 auto;min-width:0;text-align:center;
  font-family:var(--mono);font-size:var(--t-sm);font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip.act{border-color:var(--route)}
.chip.act .nm{color:var(--route)}
.chip.act .ix{background:var(--route);color:#0a0e13}
.chip.drag{border-color:var(--accent);background:var(--bg-2);opacity:.55}
.chip.add{border-style:dashed;border-color:var(--border-strong);justify-content:center;padding:0 10px}
.chip.add .nm{color:var(--accent-2)}
.chipempty{padding:18px 0;text-align:center;font-size:var(--t-sm);color:var(--text-fainter)}

/* ---- NavLog leg cards ---- */
.lgc{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:var(--gut);width:100%;text-align:left}
.lgc.act{border-color:var(--route);background:rgba(240,165,0,.06)}
.lgc.act .lgh b{color:var(--route)}
.lgh .now{flex:0 0 auto;font-size:var(--t-2xs);font-weight:700;letter-spacing:.11em;
  text-transform:uppercase;color:#0a0e13;background:var(--route);border-radius:4px;padding:2px 6px}
.lgh{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.lgh b{flex:1 1 auto;min-width:0;font-family:var(--mono);font-size:var(--t-sm);font-weight:700;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lgh span{flex:0 0 auto;font-size:var(--t-2xs);font-weight:700;letter-spacing:.11em;
  text-transform:uppercase;color:var(--text-fainter)}
.lgg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 6px}
.lgg .k{display:block;font-size:var(--t-2xs);font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text-muted)}
.lgg .v{display:block;font-family:var(--mono);font-size:var(--t-md);font-weight:700;color:var(--text);margin-top:1px}
.lgg .v.warn{color:var(--bad)}

/* ---- Profile ---- */
.prof{position:relative;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;touch-action:none}
.prof svg{display:block;width:100%;height:190px}
.profstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 6px;margin-top:10px}
.profstats .k{display:block;font-size:var(--t-2xs);font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text-muted)}
.profstats .v{display:block;font-family:var(--mono);font-size:var(--t-md);font-weight:700;
  color:var(--text);margin-top:1px}
.profstats .v.warn{color:var(--bad)}

/* ---- hero strip: one number dominant ---- */
.strip{
  flex:0 0 auto;display:flex;align-items:stretch;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  background:var(--bg);
}
.hero{flex:0 0 46%;display:flex;flex-direction:column;justify-content:center;
  padding:8px 0 8px 14px;border-right:1px solid var(--border)}
.hero .k{font-size:var(--t-2xs);font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-muted)}
.hero .v{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--accent);
  line-height:1.1;margin-top:2px}
.hero .v.warn{color:var(--bad)}
.hero .v u{font-size:var(--t-sm);text-decoration:none;margin-left:3px}
.minis{flex:1 1 auto;display:flex}
.mini{flex:1 1 0;min-width:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;padding:0 2px}
.mini .k{font-size:var(--t-2xs);font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-muted)}
.mini .v{font-family:var(--mono);font-size:var(--t-md);font-weight:700;color:var(--text)}

.dtabs{
  flex:0 0 auto;display:flex;align-items:center;gap:var(--gut);
  height:50px;padding:0 var(--pedge);
}
.dtabs .spacer{flex:1 1 auto}
.dtool{
  width:34px;height:var(--mod-a);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);background:var(--bg-2);border:1px solid var(--border);
}
.dtool svg{width:16px;height:16px}
.dtool.arm{border-color:var(--bad);color:var(--bad)}
.dtab{
  height:var(--mod-a);padding:0 11px;border-radius:var(--radius);
  display:flex;align-items:center;
  font-size:var(--t-sm);font-weight:600;color:var(--text-muted);
  background:var(--bg-2);border:1px solid var(--border);
}
.dtab.on{background:var(--accent);border-color:var(--accent);color:#0a0e13}
.dgrip{
  flex:0 0 auto;height:22px;display:flex;align-items:center;justify-content:center;
  border-top:1px solid var(--border);background:var(--panel);
  touch-action:none;cursor:ns-resize;
}
.dgrip span{width:46px;height:4px;border-radius:2px;background:var(--border-strong);
  transition:background .12s}
.dgrip.on span{background:var(--accent)}

/* ---- radio: frequencies in route order ---- */
.fqp{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:2px}
.fqp.act{border-color:var(--route);background:rgba(240,165,0,.06)}
.fqh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fqh .ix{flex:0 0 18px;height:18px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;background:var(--bg);color:var(--text-fainter);
  font-family:var(--mono);font-size:var(--t-2xs);font-weight:700}
.fqp.act .fqh .ix{background:var(--route);color:#0a0e13}
.fqh b{flex:1 1 auto;min-width:0;font-family:var(--mono);font-size:var(--t-sm);font-weight:700;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fqp.act .fqh b{color:var(--route)}
.fqh span{flex:0 0 auto;font-size:var(--t-2xs);font-weight:700;letter-spacing:.11em;
  text-transform:uppercase;color:var(--text-fainter)}
.fqr{width:100%;display:flex;align-items:center;gap:10px;padding:7px 0;
  border-top:1px solid var(--border);text-align:left}
.fqr .t{flex:1 1 auto;min-width:0;font-size:var(--t-sm);color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fqr .f{flex:0 0 auto;font-family:var(--mono);font-size:var(--t-md);font-weight:700;color:var(--accent-2)}
.fqr.pri .t{color:var(--text-2)}
.fqr.pri .f{color:var(--accent)}
.fqnone{padding:6px 0;font-size:var(--t-sm);color:var(--text-fainter);border-top:1px solid var(--border)}
.fqleg{display:flex;align-items:center;gap:10px;padding:8px 0 8px 26px;
  position:relative;font-size:var(--t-sm);color:var(--text-muted)}
.fqleg:before{content:'';position:absolute;left:9px;top:0;bottom:0;
  border-left:2px dotted var(--border-strong)}
.fqleg .d{flex:0 0 auto;font-family:var(--mono);color:var(--text-fainter);font-size:var(--t-2xs)}
.fqleg .e{flex:1 1 auto;min-width:0;font-family:var(--mono);font-size:var(--t-sm);color:var(--text-2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---- waypoint entry sheet ---- */
.wsearch{padding:12px 12px 8px}
.wsearch input{
  width:100%;height:var(--mod-b);
  background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);
  padding:0 12px;color:var(--text);font-family:var(--mono);font-size:var(--t-in);
  outline:none;-webkit-appearance:none;
}
.wsearch input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.wcoord{display:flex;gap:var(--gut);padding:0 12px 12px}
.wcoord input{flex:1 1 0;min-width:0;height:var(--mod-b);
  background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);
  padding:0 10px;color:var(--accent);font-family:var(--mono);font-size:var(--t-in);
  text-align:center;outline:none;-webkit-appearance:none}
.wcoord button{flex:0 0 62px;height:var(--mod-b);border-radius:var(--radius);
  background:var(--accent);color:#0a0e13;font-size:var(--t-sm);font-weight:700}
.wrow{width:100%;height:var(--mod-b);display:flex;align-items:center;gap:10px;padding:0 14px;
  text-align:left;font-size:var(--t-md);color:var(--text)}
.wrow + .wrow{border-top:1px solid var(--border)}
.wrow:active{background:var(--inset)}
.wrow .id{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;
  color:var(--accent-2);flex:0 0 52px}
.wrow .nm2{flex:1 1 auto;min-width:0;font-size:var(--t-sm);color:var(--text-2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrow .cat{flex:0 0 auto;font-size:var(--t-2xs);font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text-fainter)}
.wnote{padding:8px 14px 10px;font-size:var(--t-2xs);color:var(--text-fainter);
  line-height:1.5;border-top:1px solid var(--border)}
.wrow.danger{color:var(--bad)}
.wsec{padding:10px 14px 6px;font-size:var(--t-2xs);font-weight:700;letter-spacing:.11em;
  text-transform:uppercase;color:var(--text-fainter);border-top:1px solid var(--border)}

/* ---- Right sheet (More) ----------------------------------- */
.sheet{
  position:fixed;top:0;bottom:0;right:0;width:59%;z-index:1000;
  background:var(--panel);border-left:1px solid var(--border-strong);
  transform:translateX(100%);transition:transform .2s ease;
  display:flex;flex-direction:column;
  padding-top:calc(var(--sat) + var(--top-pad));
  padding-bottom:var(--sabp);
}
.sheet.on{transform:translateX(0)}
.sheet .top{display:flex;gap:1px;margin:0 10px 16px;background:var(--border);
  border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stile{flex:1 1 0;background:var(--bg-2);padding:12px 0;
  display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text-2)}
.stile svg{width:20px;height:20px}
.stile .lab{font-size:var(--t-sm);font-weight:600}
.shead{display:flex;align-items:baseline;justify-content:space-between;padding:0 12px 6px}
.shead .k{font-size:var(--t-xs);font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text-fainter)}
.shead .a{font-size:var(--t-sm);font-weight:600;color:var(--accent-2)}
.slist{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;
  border-top:1px solid var(--border)}
.srow{height:var(--mod-b);display:flex;align-items:center;gap:12px;padding:0 12px;
  font-size:var(--t-md);color:var(--text)}
.srow + .srow{border-top:1px solid var(--border)}
.srow:active{background:var(--inset)}
.srow .sq{
  width:26px;height:26px;border-radius:6px;flex:0 0 26px;
  display:flex;align-items:center;justify-content:center;color:#0a0e13;
}
.srow .sq svg{width:15px;height:15px}
.sver{flex:0 0 auto;padding:10px 12px;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:var(--t-xs);color:var(--text-fainter);letter-spacing:.04em}

/* ---- Airport card ----------------------------------------- */
.card{
  position:fixed;left:0;right:0;bottom:0;z-index:1000;
  transform:translateY(100%);transition:transform .22s ease;
  display:flex;flex-direction:column;
  background:var(--bg-2);
  border-top:1px solid var(--border-strong);
  padding-bottom:var(--sabp);
}
.card.on{transform:translateY(0)}
.cgrip{flex:0 0 auto;height:20px;display:flex;align-items:center;justify-content:center;
  background:var(--panel);touch-action:none;cursor:ns-resize}
.cgrip span{width:46px;height:4px;border-radius:2px;background:var(--border-strong);
  transition:background .12s}
.cgrip.on span{background:var(--accent)}
.chead{
  flex:0 0 var(--mod-b);display:flex;align-items:center;gap:8px;padding:0 10px;
  background:var(--panel);border-bottom:1px solid var(--border);
}
.chead .back{
  height:26px;padding:0 10px;border-radius:var(--radius);
  display:flex;align-items:center;gap:4px;
  background:var(--bg-2);border:1px solid var(--border-strong);
  font-size:var(--t-sm);font-weight:600;color:var(--text-2);
}
.chead .ttl{flex:1 1 auto;min-width:0;text-align:center}
.chead .ttl b{display:block;font-family:var(--mono);font-size:var(--t-md);font-weight:700;line-height:1.1}
.chead .ttl span{display:block;font-size:var(--t-2xs);color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chead .star{width:30px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.chead .star.on{color:var(--accent)}
.chead .star svg{width:16px;height:16px}
.cact{
  flex:0 0 52px;display:flex;background:var(--bg);
  border-bottom:1px solid var(--border);
}
.cact button{
  flex:1 1 0;min-width:0;font-size:var(--t-sm);font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px;
}
.cact button + button{border-left:1px solid var(--border)}
.ctabs{flex:0 0 42px;display:flex;background:var(--panel);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ctabs button{flex:1 1 0;min-width:0;font-size:var(--t-sm);font-weight:600;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px}
.ctabs button + button{border-left:1px solid var(--border)}
.ctabs button.on{background:var(--bg-2);color:var(--text)}
.csub{flex:0 0 42px;display:flex;align-items:center;gap:var(--gut);
  padding:0 10px;background:var(--bg);border-bottom:1px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch}
.csub.off{display:none}
.csub button{flex:0 0 auto;height:26px;padding:0 12px;border-radius:var(--radius);
  font-size:var(--t-sm);font-weight:600;color:var(--text-muted);
  background:transparent;border:1px solid transparent}
.csub button.on{background:var(--accent-2);color:#0a0e13}
.cbody{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}

/* card content blocks */
.cinfo{display:flex;gap:12px}
.cthumb{width:64px;height:64px;flex:0 0 64px;border-radius:6px;
  background:var(--inset);border:1px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:var(--t-2xs);color:var(--text-fainter)}
.cinfo .m{min-width:0}
.cinfo .m b{display:block;font-size:var(--t-md);font-weight:700}
.cinfo .m span{display:block;font-size:var(--t-sm);color:var(--text-dim);margin-top:2px}
.csec{margin-top:16px;font-size:var(--t-2xs);font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-fainter);
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.kv{display:flex;justify-content:space-between;gap:12px;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:var(--t-sm)}
.kv .k{color:var(--text-muted);flex:0 0 auto}
.kv .v{font-family:var(--mono);color:var(--text);text-align:right;min-width:0}
.kv .v.acc{color:var(--accent-2)}
.kv .v.amb{color:var(--accent)}
.cnote{margin-top:14px;font-size:var(--t-2xs);color:var(--text-fainter);line-height:1.5}
.cempty{padding:26px 0;text-align:center;font-size:var(--t-sm);color:var(--text-fainter)}

.metar .hdr{display:flex;align-items:center;gap:6px;font-size:var(--t-sm);font-weight:700}
.metar .dot{width:9px;height:9px;border-radius:50%}
.metar .age{margin-left:auto;font-size:var(--t-sm);color:var(--accent-2);font-weight:600}
.metar .raw{margin-top:8px;padding:10px;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;font-family:var(--mono);font-size:var(--t-sm);
  line-height:1.5;word-break:break-word}

.rwyc{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:var(--gut)}
.rwyc .rh{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.rwyc .rh b{flex:1 1 auto;font-family:var(--mono);font-size:var(--t-md);font-weight:700;color:var(--text)}
.rwyc .rh span{font-size:var(--t-2xs);font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-fainter)}
.rwyg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 6px}
.rwyg .k{display:block;font-size:var(--t-2xs);font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text-muted)}
.rwyg .v{display:block;font-family:var(--mono);font-size:var(--t-md);font-weight:700;
  color:var(--text);margin-top:1px}
.rwyg .v.warn{color:var(--bad)}
.rwyg .v.ok{color:var(--good)}

.prow2{display:flex;align-items:center;gap:10px;width:100%;
  padding:11px 0;border-bottom:1px solid var(--border);text-align:left}
.prow2 .bdg{flex:0 0 auto;font-size:var(--t-2xs);font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--good)}
.prow2 .t2{flex:1 1 auto;min-width:0;font-size:var(--t-sm);color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow2 .go{flex:0 0 auto;font-size:var(--t-sm);font-weight:600;color:var(--accent-2)}

.ntm{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px;margin-bottom:var(--gut)}
.ntm .nh{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.ntm .nh b{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;color:var(--accent)}
.ntm .nh span{margin-left:auto;font-family:var(--mono);font-size:var(--t-2xs);color:var(--text-fainter)}
.ntm p{margin:0;font-size:var(--t-sm);line-height:1.5;color:var(--text-2)}

/* ---- GPS window (NM Plotter's own component) ---------------
   Proportions taken from the live desktop component: panel width
   as the reference, everything centred, coordinates dominant.     */
.gpsov{position:fixed;inset:0;z-index:1200;display:none;
  align-items:center;justify-content:center;padding:16px;
  background:rgba(3,5,8,.72);
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.gpsov.on{display:flex}
.gpswin{
  width:100%;max-width:400px;
  background:var(--panel);border:1px solid var(--border-strong);
  border-radius:12px;overflow:hidden;
  box-shadow:0 18px 46px rgba(0,0,0,.7);
}
.gpsh{
  display:flex;align-items:center;gap:8px;
  height:var(--mod-b);padding:0 6px 0 14px;
  background:var(--bg-2);border-bottom:1px solid var(--border);
}
.gpsh .t{
  flex:1 1 auto;min-width:0;
  font-family:var(--mono);font-size:var(--t-xs);letter-spacing:.11em;
  text-transform:uppercase;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.gpsh .t b{color:var(--accent);font-weight:700}
.gpsfmt{display:flex;flex:0 0 auto;gap:0;
  border:1px solid var(--border-strong);border-radius:var(--radius);overflow:hidden}
.gpsfmt button{
  height:28px;padding:0 9px;
  font-family:var(--mono);font-size:var(--t-xs);font-weight:700;letter-spacing:.03em;
  color:var(--text-muted);background:var(--bg);
}
.gpsfmt button + button{border-left:1px solid var(--border-strong)}
.gpsfmt button.on{background:rgba(255,176,32,.14);color:var(--accent)}
.gpsx{flex:0 0 auto;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;color:var(--text-muted)}

.gpsb{padding:22px 14px 20px;text-align:center}
.gpsname{
  font-family:var(--mono);font-size:var(--t-sm);letter-spacing:.11em;
  text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;
}
.gpsname b{color:var(--text);font-weight:700}
.gpsline{
  font-family:var(--mono);font-weight:700;color:var(--accent);
  font-size:clamp(24px, 8vw, 34px);line-height:1.32;letter-spacing:.01em;
  text-shadow:0 0 18px rgba(255,176,32,.26);
  white-space:nowrap;
}
.gpsprog{margin-top:16px;font-family:var(--mono);font-size:var(--t-sm);
  color:var(--text-faint);letter-spacing:.06em}

.gpstabs{display:flex;border-top:1px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch}
.gpstabs button{
  flex:1 0 33.333%;min-width:0;height:50px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border-top:3px solid transparent;background:transparent;
}
.gpstabs button + button{border-left:1px solid var(--border)}
.gpstabs .role{font-family:var(--mono);font-size:var(--t-xs);font-weight:700;
  letter-spacing:.11em;text-transform:uppercase;color:var(--text-fainter)}
.gpstabs .nm{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;
  color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.gpstabs button.on{border-top-color:var(--accent);background:rgba(255,176,32,.09)}
.gpstabs button.on .role,.gpstabs button.on .nm{color:var(--accent)}

/* ---- Full-screen view layer (non-map tabs) ----------------- */
.view{
  position:fixed;left:0;right:0;top:0;z-index:800;background:var(--bg);display:none;
  bottom:calc(var(--tabbar) + var(--sabp));
  flex-direction:column;
  padding-top:calc(var(--sat) + var(--top-pad));
}
.view.on{display:flex}
.vhead{flex:0 0 var(--mod-b);display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:0 var(--edge);border-bottom:1px solid var(--border)}
.vhead b{font-size:var(--t-lg);font-weight:700}
.vhead .sub{font-size:var(--t-xs);color:var(--text-fainter);
  letter-spacing:.09em;text-transform:uppercase}
.vbody{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px var(--edge) 20px}
.vwrap{display:none;flex:1 1 auto;flex-direction:column;min-height:0}
.vwrap.on{display:flex}
.vempty{flex:1 1 auto;display:flex;align-items:center;justify-content:center;
  color:var(--text-fainter);font-size:var(--t-sm);letter-spacing:.1em;text-transform:uppercase}

/* ---- Quick Fuel Check ------------------------------------- */
.fcard{background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:12px;margin-bottom:12px}
.flab{font-size:var(--t-xs);font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-2);margin-bottom:10px}
.fsub{display:block;font-size:var(--t-2xs);font-weight:700;letter-spacing:.11em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:4px}
.fin{
  width:100%;height:var(--mod-a);
  background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);
  padding:0 10px;text-align:right;
  font-family:var(--mono);font-size:var(--t-in);font-weight:600;color:var(--accent);
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .12s,box-shadow .12s;
}
.fin::placeholder{color:var(--text-fainter);font-weight:400}
.fin:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.fin::-webkit-outer-spin-button,.fin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:var(--gut)}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--gut)}
.fdens{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:#171208;border:1px solid #3a2e10;border-radius:8px;padding:8px 10px;margin-bottom:12px}
.fdens .k{font-size:var(--t-xs);font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--accent)}
.fdens .fin{width:110px;border-color:#3a2e10}
.fseg{display:flex;gap:4px}
.fseg button{
  flex:1 1 0;height:var(--mod-a);border-radius:var(--radius);
  background:var(--bg-2);border:1px solid var(--border);
  font-family:var(--mono);font-size:var(--t-sm);font-weight:600;color:var(--text-muted);
}
.fseg button.on{background:var(--accent);border-color:var(--accent);color:#0a0e13}
.fout{margin-top:12px;background:var(--inset);border:1px solid var(--border-strong);
  border-radius:8px;padding:12px;text-align:center}
.fout .r{display:flex;justify-content:space-between;font-size:var(--t-sm);color:var(--text-muted);
  font-family:var(--mono)}
.fout .r + .r{margin-top:3px}
.fout .big{font-family:var(--mono);font-size:var(--t-disp);font-weight:700;color:var(--accent);margin-top:10px;line-height:1}
.fout .big u{font-size:var(--t-md);font-weight:600;text-decoration:none;margin-left:3px}
.fout .alt{font-family:var(--mono);font-size:var(--t-sm);color:var(--text-muted);margin-top:6px}
.fnone{margin-top:12px;text-align:center;font-size:var(--t-sm);color:var(--text-fainter);padding:10px 0}

/* ---- Tab-bar editor --------------------------------------- */
.ted{position:fixed;inset:0;z-index:1200;display:none;
  align-items:flex-end;justify-content:center;background:rgba(3,5,8,.66)}
.ted.on{display:flex}
.tedw{width:100%;max-width:420px;max-height:82%;display:flex;flex-direction:column;
  background:var(--panel);border-top:1px solid var(--border-strong);
  border-radius:12px 12px 0 0;overflow:hidden;padding-bottom:var(--sabp)}
.tedw.tall{height:82%}          /* fixed height: sheet must not jump while filtering */
.tedh{flex:0 0 var(--mod-b);display:flex;align-items:center;gap:8px;padding:0 6px 0 14px;
  background:var(--bg-2);border-bottom:1px solid var(--border)}
.tedh b{flex:1 1 auto;font-size:var(--t-md);font-weight:700}
.tedh .x{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--text-muted)}
.tedslots{display:flex;gap:var(--gut);padding:12px}
.tslot{
  flex:1 1 0;min-width:0;border-radius:var(--radius);
  background:var(--bg-2);border:1px solid var(--border);
  padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.tslot.sel{border-color:var(--accent);background:var(--inset)}
.tslot .n{font-size:var(--t-2xs);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-fainter)}
.tslot.sel .n{color:var(--accent)}
.tslot .v{font-size:var(--t-sm);font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tedpage{padding:12px 12px 0}
.tedpage .pl{font-size:var(--t-2xs);font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-fainter);margin-bottom:6px}
.tedpage .row{display:flex;gap:4px;margin-bottom:12px}
.tslot.sm{padding:7px 2px;gap:3px}
.tslot.sm .n{font-size:var(--t-2xs);letter-spacing:.08em}
.tslot.sm .v{font-family:var(--mono);font-size:var(--t-2xs);font-weight:700;letter-spacing:.01em}
.tedhint{padding:0 14px 8px;font-size:var(--t-xs);color:var(--text-fainter);letter-spacing:.04em}
.tsrow{padding:14px}
.tsrow + .tsrow{border-top:1px solid var(--border)}
.tsmeta{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.tsmeta b{font-family:var(--mono);font-size:var(--t-sm);font-weight:700;color:var(--accent)}
.tsmeta span{font-family:var(--mono);font-size:var(--t-2xs);color:var(--text-fainter)}
.tsex{color:var(--text)}
.tsex .m{font-family:var(--mono)}
.tsex .u{text-transform:uppercase;letter-spacing:.11em;color:var(--text-muted);font-weight:700}
.tsex div{margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tswhere{margin-top:8px;font-size:var(--t-2xs);letter-spacing:.05em;
  color:var(--text-fainter);line-height:1.5}
.tedlist{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;border-top:1px solid var(--border)}
.tedrow{width:100%;height:var(--mod-b);display:flex;align-items:center;gap:10px;padding:0 14px;
  font-size:var(--t-md);color:var(--text);text-align:left}
.tedrow + .tedrow{border-top:1px solid var(--border)}
.tedrow:active{background:var(--inset)}
.tedrow .ic{width:22px;flex:0 0 22px;color:var(--text-muted);display:flex}
.tedrow .ic svg{width:19px;height:19px}
.tedrow .badge{margin-left:auto;font-family:var(--mono);font-size:var(--t-xs);font-weight:700;
  color:#0a0e13;background:var(--accent);border-radius:4px;padding:2px 6px}

/* ---- Metrics overlay -------------------------------------- */
.mx{position:fixed;inset:0;z-index:1500;display:none;pointer-events:none}
.mx.on{display:block}
.mxb{position:absolute;left:0;right:0;border-top:1px dashed rgba(255,176,32,.55);
  border-bottom:1px dashed rgba(255,176,32,.55);background:rgba(255,176,32,.07)}
.mxl{position:absolute;right:6px;font-family:var(--mono);font-size:var(--t-2xs);
  color:var(--accent);background:rgba(10,14,19,.85);padding:1px 4px;border-radius:3px}

/* ---- Toast ------------------------------------------------- */
.toast{
  position:fixed;left:50%;bottom:calc(var(--tabbar) + var(--sabp) + 56px);
  transform:translateX(-50%) translateY(8px);
  z-index:1400;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;
  background:var(--inset);border:1px solid var(--border-strong);border-radius:16px;
  padding:8px 14px;font-size:var(--t-sm);color:var(--text-2);white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ===================== TOP CHROME ===================== -->
  <header class="chrome" id="chrome">
    <div class="toolbar">
      <button class="tb" id="tbLayers" aria-label="Layers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>
      </button>
      <button class="tb" id="tbFpl" aria-label="Flight plan"><span class="txt">FPL</span></button>
      <button class="tb" id="tbSet" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.6v2.6M12 18.8v2.6M21.4 12h-2.6M5.2 12H2.6M18.6 5.4l-1.8 1.8M7.2 16.8l-1.8 1.8M18.6 18.6l-1.8-1.8M7.2 7.2L5.4 5.4"/></svg>
      </button>
      <button class="tb" id="tbProf" aria-label="Terrain profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M2 18l5-7 4 4 4-6 7 9z"/></svg>
      </button>
      <button class="tb on" id="tbActy" aria-label="Activity bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.4"/><path d="M12 12l4-3.4"/></svg>
      </button>
      <button class="tb" id="tbRad" aria-label="Frequencies in route order">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="2.2"/><path d="M8.2 8.2a5.4 5.4 0 0 0 0 7.6M15.8 8.2a5.4 5.4 0 0 1 0 7.6"/><path d="M5.4 5.4a9.4 9.4 0 0 0 0 13.2M18.6 5.4a9.4 9.4 0 0 1 0 13.2"/></svg>
      </button>
      <button class="tb gps" id="tbLoc" aria-label="Track my position">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.4"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><path d="M12 1.8v3.4M12 18.8v3.4M22.2 12h-3.4M5.2 12H1.8"/></svg>
      </button>
    </div>
    <div class="searchrow">
      <div class="search" id="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10.5" cy="10.5" r="6.6"/><path d="M15.4 15.4L21 21"/></svg>
        <input id="searchIn" type="text" placeholder="Search fields, fixes, places"
               autocapitalize="characters" autocorrect="off" spellcheck="false" enterkeyhint="search">
        <button class="sx" id="searchX" aria-label="Clear">&times;</button>
      </div>
    </div>
  </header>

  <!-- ===================== MAP ===================== -->
  <main class="map" id="map">
    <div class="grat"></div>
    <div class="mapnote">Placeholder map</div>

    <div class="fld" style="left:26%;top:32%" data-fld="AYNZ"><i></i><b>AYNZ</b></div>
    <div class="fld" style="left:57%;top:22%" data-fld="AYGA"><i></i><b>AYGA</b></div>
    <div class="fld" style="left:79%;top:47%" data-fld="AYMH"><i></i><b>AYMH</b></div>
    <div class="fld" style="left:44%;top:66%" data-fld="AYMD"><i></i><b>AYMD</b></div>

    <!-- Left rail -->
    <div class="rail" id="rail">

      <!-- open state: layer toggles -->
      <div class="rgrp open-only">
        <button class="rb on" id="rbVfrOpen"><span class="lab">VFR</span></button>
        <button class="rb lyr on" data-lyr="Airports">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 4l8 15H4z"/></svg>
        </button>
        <button class="rb lyr" data-lyr="Airspace">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.4l7.4 4.3v8.6L12 20.6 4.6 16.3V7.7z"/></svg>
        </button>
        <button class="rb lyr on" data-lyr="Waypoints">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.2l2.3 6.5 6.5 2.3-6.5 2.3-2.3 6.5-2.3-6.5L3.2 12l6.5-2.3z"/></svg>
        </button>
        <button class="rb lyr on" data-lyr="Routes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="18" r="2.4"/><circle cx="19" cy="6" r="2.4"/><path d="M6.9 16.3L17.1 7.7"/></svg>
        </button>
        <button class="rb lyr" data-lyr="Terrain">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M3 19l6-9 4 5.5 2.5-3.5L21 19z"/></svg>
        </button>
      </div>

      <!-- collapsed state -->
      <div class="rgrp collapsed-only">
        <button class="rb tall" id="rbVfr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h16"/><circle cx="9" cy="7" r="2.1" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="2.1" fill="currentColor" stroke="none"/><circle cx="8" cy="17" r="2.1" fill="currentColor" stroke="none"/></svg>
          <span class="lab">VFR</span>
        </button>
      </div>

      <div class="rgrp collapsed-only">
        <button class="rb" id="rbMark" aria-label="Mark position">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 21.5s7-6.3 7-11.4A7 7 0 0 0 5 10.1c0 5.1 7 11.4 7 11.4z"/><circle cx="12" cy="10" r="2.4"/></svg>
        </button>
      </div>

      <div class="rgrp collapsed-only">
        <button class="rb tall" id="rbRec">
          <span class="lab">REC</span><span class="tick">00:00</span>
        </button>
      </div>

      <div class="rgrp collapsed-only">
        <button class="rb" id="rbRoute" aria-label="Current route">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="18" r="2.4"/><circle cx="19" cy="6" r="2.4"/><path d="M6.9 16.3L17.1 7.7"/></svg>
        </button>
        <button class="rb" id="rbIn" aria-label="Zoom in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="rb" id="rbOut" aria-label="Zoom out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
        </button>
      </div>

    </div>
  </main>

  <!-- ===================== ACTIVITY BAR ===================== -->
  <div class="acty" id="acty">
    <div class="pages"><div class="page" id="actyPage"></div></div>
    <button class="apage" id="actyNext" aria-label="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

  <!-- ===================== TAB BAR (config-driven) ===================== -->
  <nav class="tabs" id="tabbar"></nav>

</div>

<!-- ===================== OVERLAYS ===================== -->
<div class="scrim" id="scrim"></div>

<!-- Layers popover -->
<div class="pop" id="popLayers">
  <div class="caret" id="popCaret"></div>
  <div class="pop2">
    <div class="pcol l">
      <div class="prow sel">PNG vector (offline)</div>
      <div class="prow">CARTO dark</div>
      <div class="prow">Satellite</div>
      <div class="psec">Overlays</div>
      <div class="prow"><span class="ck"></span>Terrain</div>
      <div class="prow"><span class="ck"></span>Labels</div>
    </div>
    <div class="pcol">
      <div class="prow"><span class="ck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><path d="M4 12.5l5 5 11-11"/></svg></span>Airfields</div>
      <div class="prow"><span class="ck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><path d="M4 12.5l5 5 11-11"/></svg></span>My waypoints</div>
      <div class="prow"><span class="ck"></span>Navaids</div>
      <div class="prow"><span class="ck"></span>Enroute fixes</div>
      <div class="prow"><span class="ck"></span>Danger / Restricted</div>
      <div class="prow"><span class="ck"></span>MBZ</div>
      <div class="prow"><span class="ck"></span>Flight category</div>
      <div class="prow"><span class="ck"></span>Procedure fixes</div>
    </div>
  </div>
</div>

<!-- FPL drop-down -->
<div class="drop" id="dropFpl">
  <div class="dbody" id="fplBody"></div>
  <div class="strip" id="fplStrip"></div>
  <div class="dtabs">
    <button class="dtool" id="fplClr" aria-label="Clear route">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <button class="dtool" id="fplRev" aria-label="Reverse route">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M4 8h13l-3.4-3.4M20 16H7l3.4 3.4"/></svg>
    </button>
    <span class="spacer"></span>
    <button class="dtab on" data-ft="route">Route</button>
    <button class="dtab" data-ft="navlog">NavLog</button>
    <button class="dtab" data-ft="profile">Profile</button>
  </div>
  <div class="dgrip" id="fplGrip" aria-label="Resize panel"><span></span></div>
</div>

<!-- Radio: frequencies in route order -->
<div class="drop" id="dropRad">
  <div class="dbody" id="radBody"></div>
  <div class="dgrip" id="radGrip" aria-label="Resize panel"><span></span></div>
</div>

<!-- Waypoint entry / chip actions -->
<div class="ted" id="wptSheet">
  <div class="tedw">
    <div class="tedh">
      <b id="wptTitle">Add waypoint</b>
      <button class="x" id="wptClose" aria-label="Close">&times;</button>
    </div>
    <div id="wptTop"></div>
    <div class="tedlist" id="wptList"></div>
  </div>
</div>

<!-- More sheet -->
<div class="sheet" id="sheetMore">
  <div class="top">
    <button class="stile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.6v11"/><path d="M8 10.6l4 4 4-4"/><path d="M5 17v3.4h14V17"/></svg><span class="lab">Downloads</span></button>
    <button class="stile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.6v2.6M12 18.8v2.6M21.4 12h-2.6M5.2 12H2.6M18.6 5.4l-1.8 1.8M7.2 16.8l-1.8 1.8M18.6 18.6l-1.8-1.8M7.2 7.2L5.4 5.4"/></svg><span class="lab">Settings</span></button>
  </div>
  <div class="shead"><span class="k">Views</span><button class="a" id="editTabs">Edit</button></div>
  <div class="slist" id="moreList"></div>
  <div class="sver" id="sver"></div>
</div>

<!-- Airport card -->
<div class="card" id="card">
  <div class="cgrip" id="cardGrip" aria-label="Resize card"><span></span></div>
  <div class="chead">
    <button class="back" id="cardBack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round" style="width:11px;height:11px"><path d="M15 5l-7 7 7 7"/></svg>
      Map
    </button>
    <div class="ttl"><b id="cardIcao"></b><span id="cardName"></span></div>
    <button class="star" id="cardStar" aria-label="Favourite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3.4l2.5 5.2 5.7.8-4.1 4 1 5.7-5.1-2.7-5.1 2.7 1-5.7-4.1-4 5.7-.8z"/></svg>
    </button>
  </div>
  <div class="cact" id="cardAct"></div>
  <div class="ctabs" id="cardTabs"></div>
  <div class="csub" id="cardSub"></div>
  <div class="cbody" id="cardBody"></div>
</div>

<!-- GPS window -->
<div class="gpsov" id="gpsOv">
  <div class="gpswin">

<script>
(function(){
  'use strict';

  var VERSION = 'v18';
  var BUILD   = '2026-07-19';

  var $  = function(s){ return document.querySelector(s); };
  var $$ = function(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); };

  /* ---------- toast ---------- */
  var toastEl = $('#toast'), toastT = null;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('on');
    clearTimeout(toastT);
    toastT = setTimeout(function(){ toastEl.classList.remove('on'); }, 1400);
  }

  /* ---------- overlay manager ---------- */
  var scrim = $('#scrim');
  function closeAll(){
    $('#popLayers').classList.remove('on');
    $('#dropFpl').classList.remove('on');
    $('#sheetMore').classList.remove('on');
    if (gps) gps.classList.remove('on');
    if (actEd) actEd.classList.remove('on');
    if (typeSc) typeSc.classList.remove('on');
    if (wpt) wpt.classList.remove('on');
    if (sPanel){ sPanel.classList.remove('on'); sBox.classList.remove('on'); }
    if (ted) ted.classList.remove('on');
    scrim.classList.remove('on');
    $('#tbLayers').classList.remove('on');
    $('#tbFpl').classList.remove('on');
    if (radDrop){ radDrop.classList.remove('on'); $('#tbRad').classList.remove('on'); }
    renderTabs();
  }
  scrim.addEventListener('click', closeAll);

  /* ---------- Layers popover (anchored to its button) ---------- */
  var pop = $('#popLayers'), caret = $('#popCaret');
  function openLayers(){
    var open = pop.classList.contains('on');
    closeAll();
    if (open) return;
    var btn = $('#tbLayers').getBoundingClientRect();
    var chrome = $('#chrome').getBoundingClientRect();
    // Panel: 19px from the left edge, 48px shy of the right (measured).
    pop.style.left = '19px';
    pop.style.width = (window.innerWidth - 19 - 48) + 'px';
    pop.style.top = (chrome.bottom + 6.5) + 'px';
    caret.style.left = (btn.left + btn.width/2 - 19 - 6) + 'px';
    pop.classList.add('on');
    scrim.classList.add('on');
    $('#tbLayers').classList.add('on');
  }
  $('#tbLayers').addEventListener('click', openLayers);

  $$('#popLayers .prow').forEach(function(r){
    r.addEventListener('click', function(){
      var ck = r.querySelector('.ck');
      if (ck){
        ck.innerHTML = ck.innerHTML.trim()
          ? ''
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><path d="M4 12.5l5 5 11-11"/></svg>';
      } else {
        var col = r.parentNode;
        Array.prototype.forEach.call(col.querySelectorAll('.prow.sel'), function(x){ x.classList.remove('sel'); });
        r.classList.add('sel');
      }
    });
  });

  /* ============================================================
     FLIGHT PLAN
     Route construction, NavLog and Profile. Great-circle maths is
     real; terrain is a deterministic model, not survey data.
     DEMO ONLY - not for navigation.
     ============================================================ */

  var AC  = { reg:'P2-LAW', type:'BK117', tas:110, burn:176, fob:500, resMin:30, alt:9500 };
  var SET = { clr:1000, labels:'auto', routeLine:true, coordFmt:'ddm' };
  var SET_KEY = 'nmp.iphone.set', savedEtd = null;
  (function(){
    try{
      var s = JSON.parse(localStorage.getItem(SET_KEY));
      if (s){
        if (s.AC)  for (var k in s.AC)  AC[k]  = s.AC[k];
        if (s.SET) for (var j in s.SET) SET[j] = s.SET[j];
        if (typeof s.etd === 'number') savedEtd = s.etd;
      }
    }catch(e){}
  })();
  function saveSet(){
    try{ localStorage.setItem(SET_KEY, JSON.stringify({ AC:AC, SET:SET, etd:ETD_MIN })); }catch(e){}
  }

  /* Searchable points. cat drives the section grouping in the picker.
     Fields are ICAO/IATA real. Fixes, villages and personal waypoints
     carry DEMO coordinates - placeholders until ENR 4.3 / 4.4 and
     Danny's own list are transcribed and verified. */
  var DB = [
    { id:'AYNZ', ia:'LAE', nm:'Nadzab Tomodachi',       cat:'field', lat:-6.5698, lon:146.7261 },
    { id:'AYGA', ia:'GKA', nm:'Goroka',                 cat:'field', lat:-6.0817, lon:145.3917 },
    { id:'AYMH', ia:'HGU', nm:'Mount Hagen Kagamuga',   cat:'field', lat:-5.8267, lon:144.2961 },
    { id:'AYMD', ia:'MAG', nm:'Madang',                 cat:'field', lat:-5.2072, lon:145.7890 },
    { id:'AYPY', ia:'POM', nm:'Port Moresby Jacksons',  cat:'field', lat:-9.4433, lon:147.2200 },
    { id:'AYTK', ia:'RAB', nm:'Tokua',                  cat:'field', lat:-4.3400, lon:152.3800 },
    { id:'AYWK', ia:'WWK', nm:'Wewak Boram',            cat:'field', lat:-3.5838, lon:143.6692 },
    { id:'AYMO', ia:'MAS', nm:'Momote',                 cat:'field', lat:-2.0619, lon:147.4242 },
    { id:'AYVN', ia:'VAI', nm:'Vanimo',                 cat:'field', lat:-2.6927, lon:141.3021 },
    { id:'AYKI', ia:'UNG', nm:'Kiunga',                 cat:'field', lat:-6.1257, lon:141.2818 },
    { id:'AYTB', ia:'TBG', nm:'Tabubil',                cat:'field', lat:-5.2786, lon:141.2260 },
    { id:'AYMN', ia:'MDU', nm:'Mendi',                  cat:'field', lat:-6.1478, lon:143.6572 },
    { id:'AYWD', ia:'WBM', nm:'Wapenamanda',            cat:'field', lat:-5.6433, lon:143.8950 },
    { id:'AYKV', ia:'KVG', nm:'Kavieng',                cat:'field', lat:-2.5794, lon:150.8078 },
    { id:'AYBK', ia:'BUA', nm:'Buka',                   cat:'field', lat:-5.4222, lon:154.6733 },
    { id:'AYCH', ia:'CMU', nm:'Chimbu Kundiawa',        cat:'field', lat:-6.0242, lon:144.9706 },

    { id:'TESEM', nm:'Enroute fix',   cat:'fix', lat:-6.3400, lon:146.1200 },
    { id:'IKERU', nm:'Enroute fix',   cat:'fix', lat:-5.9500, lon:144.8000 },
    { id:'BULOM', nm:'Enroute fix',   cat:'fix', lat:-6.7100, lon:146.9800 },
    { id:'MAROS', nm:'Enroute fix',   cat:'fix', lat:-6.9500, lon:146.2000 },
    { id:'KAGUL', nm:'Enroute fix',   cat:'fix', lat:-5.5200, lon:145.1000 },
    { id:'WAPEN', nm:'Enroute fix',   cat:'fix', lat:-5.6800, lon:143.9500 },

    { id:'BULO', nm:'Bulolo',          cat:'strip', lat:-7.2200, lon:146.6500 },
    { id:'WAU',  nm:'Wau',             cat:'strip', lat:-7.3400, lon:146.7200 },
    { id:'MENY', nm:'Menyamya',        cat:'strip', lat:-7.2100, lon:146.0200 },
    { id:'ASEK', nm:'Aseki',           cat:'strip', lat:-7.3400, lon:146.1900 },
    { id:'KAIN', nm:'Kaintiba',        cat:'strip', lat:-7.5000, lon:145.8700 },
    { id:'GARA', nm:'Garaina',         cat:'strip', lat:-7.8800, lon:147.1400 },
    { id:'KABW', nm:'Kabwum',          cat:'strip', lat:-6.1000, lon:147.1800 },
    { id:'DERI', nm:'Derim',           cat:'strip', lat:-6.1800, lon:147.1000 },
    { id:'SIAL', nm:'Sialum',          cat:'strip', lat:-6.0800, lon:147.5900 },
    { id:'WASU', nm:'Wasu',            cat:'strip', lat:-5.9600, lon:147.1900 },
    { id:'FINS', nm:'Finschhafen',     cat:'strip', lat:-6.6200, lon:147.8500 },
    { id:'PIND', nm:'Pindiu',          cat:'strip', lat:-6.4600, lon:147.5000 },

    { id:'LAE BASE',    nm:'Company base',      cat:'mine', lat:-6.7338, lon:146.9998 },
    { id:'ANGAU PAD',   nm:'Angau hospital',    cat:'mine', lat:-6.7280, lon:146.9910 },
    { id:'RIDGE GATE',  nm:'Markham valley',    cat:'mine', lat:-6.4500, lon:146.5000 }
  ];
  var CAT_NM = { field:'Fields', fix:'Fixes', strip:'Strips &amp; villages', mine:'My waypoints' };
  var CAT_ORDER = ['field','fix','strip','mine'];

  var ROUTE = [
    { id:'AYNZ', nm:'Nadzab Tomodachi',      lat:-6.5698, lon:146.7261 },
    { id:'AYGA', nm:'Goroka',                lat:-6.0817, lon:145.3917 },
    { id:'AYMH', nm:'Mount Hagen Kagamuga',  lat:-5.8267, lon:144.2961 }
  ];
  var fplTab = 'route', toWpt = 1;      /* index of the point being flown TO */

  /* ---- geodesy ---- */
  var R2D = 180 / Math.PI, D2R = Math.PI / 180;
  function nmBetween(a, b){
    var p1 = a.lat * D2R, p2 = b.lat * D2R;
    var dp = (b.lat - a.lat) * D2R, dl = (b.lon - a.lon) * D2R;
    var h = Math.sin(dp/2) * Math.sin(dp/2)
          + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
    return 2 * Math.asin(Math.min(1, Math.sqrt(h))) * 3440.065;
  }
  function trkBetween(a, b){
    var p1 = a.lat * D2R, p2 = b.lat * D2R, dl = (b.lon - a.lon) * D2R;
    var y = Math.sin(dl) * Math.cos(p2);
    var x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
    return (Math.atan2(y, x) * R2D + 360) % 360;
  }
  function interp(a, b, f){
    return { lat: a.lat + (b.lat - a.lat) * f, lon: a.lon + (b.lon - a.lon) * f };
  }

  /* ---- deterministic terrain model (illustrative only) ---- */
  function terrainAt(lat, lon){
    var v = Math.sin(lat * 7.3 + lon * 4.1) * 0.50
          + Math.sin(lat * 13.7 - lon * 9.4) * 0.30
          + Math.sin(lon * 21.3 + 2.1) * 0.20;
    var r = Math.max(0, v);
    return Math.round(180 + r * r * 11800);
  }

  /* ---- derived plan ---- */
  function legs(){
    var out = [], t = 0;
    for (var i = 0; i < ROUTE.length - 1; i++){
      var a = ROUTE[i], b = ROUTE[i+1];
      var d = nmBetween(a, b), hr = d / AC.tas;
      var hi = 0;
      for (var s = 0; s <= 40; s++){
        var p = interp(a, b, s/40), e = terrainAt(p.lat, p.lon);
        if (e > hi) hi = e;
      }
      t += hr;
      out.push({ a:a, b:b, nm:d, hr:hr, cum:t, fuel:hr * AC.burn, hi:hi });
    }
    return out;
  }
  function totals(){
    var L = legs(), d = 0, hr = 0;
    L.forEach(function(l){ d += l.nm; hr += l.hr; });
    return { legs:L, nm:d, hr:hr, burn:hr * AC.burn, rem: AC.fob - hr * AC.burn };
  }
  function hhmm(hr){
    var h = Math.floor(hr), m = Math.round((hr - h) * 60);
    if (m === 60){ h += 1; m = 0; }
    return h + ':' + String(m).padStart(2, '0');
  }
  var ETD_MIN = (savedEtd !== null) ? savedEtd : 3 * 60 + 8;
  function clock(hr){
    var t = Math.round(ETD_MIN + hr * 60) % 1440;
    return String(Math.floor(t / 60)).padStart(2,'0') + String(t % 60).padStart(2,'0');
  }
  function ddm(v, isLat){
    var h = isLat ? (v < 0 ? 'S' : 'N') : (v < 0 ? 'W' : 'E');
    var a = Math.abs(v), d = Math.floor(a), m = (a - d) * 60;
    return h + String(d).padStart(isLat ? 2 : 3, '0') + ' ' + m.toFixed(1);
  }
  function label(p){ return p.id || (ddm(p.lat, true) + ' ' + ddm(p.lon, false)); }

  /* ---- render: Route ---- */
  function routeHTML(){
    var h = '<div class="drow">'
      + '<button class="dbtn">P2-LAW</button>'
      + '<button class="dbtn">BK117</button>'
      + '<button class="dbtn">' + AC.alt.toLocaleString() + '\'</button></div>'
      + '<div class="drow">'
      + '<button class="dbtn">Procedure</button>'
      + '<button class="dbtn">Routes (3)</button>'
      + '<button class="dbtn">ETD ' + clock(0) + '</button></div>';
    if (!ROUTE.length){
      h += '<div class="chipempty">No route. Tap Add to build one.</div>';
    }
    h += '<div class="chips">';
    ROUTE.forEach(function(p, i){
      h += '<button class="chip' + (i === toWpt ? ' act' : '') + (i === dragI ? ' drag' : '')
         + '" data-ci="' + i + '">'
         + '<span class="ix">' + (i + 1) + '</span>'
         + '<span class="nm">' + label(p) + '</span></button>';
    });
    h += '<button class="chip add" id="chipAdd"><span class="nm">+ Add</span></button>';
    h += '</div>';
    return h;
  }

  /* ---- render: NavLog ---- */
  function navlogHTML(){
    var T = totals();
    if (!T.legs.length) return '<div class="chipempty">Add at least two points.</div>';
    return T.legs.map(function(l, i){
      var clr = AC.alt - l.hi, now = (i === toWpt - 1);
      return '<button class="lgc' + (now ? ' act' : '') + '" data-li="' + i + '">'
        + '<div class="lgh"><b>' + label(l.a) + ' \u2192 ' + label(l.b) + '</b>'
        + (now ? '<span class="now">Flying</span>' : '<span>Leg ' + (i + 1) + '</span>') + '</div>'
        + '<div class="lgg">'
        +   '<div><span class="k">Track</span><span class="v">' + Math.round(trkBetween(l.a, l.b)) + '\u00b0</span></div>'
        +   '<div><span class="k">Dist</span><span class="v">' + l.nm.toFixed(1) + '</span></div>'
        +   '<div><span class="k">ETE</span><span class="v">' + hhmm(l.hr) + '</span></div>'
        +   '<div><span class="k">ETA</span><span class="v">' + clock(l.cum) + '</span></div>'
        +   '<div><span class="k">Fuel</span><span class="v">' + Math.round(l.fuel) + '</span></div>'
        +   '<div><span class="k">Max terr</span><span class="v' + (clr < SET.clr ? ' warn' : '') + '">'
        +     l.hi.toLocaleString() + '</span></div>'
        + '</div></button>';
    }).join('');
  }

  /* ---- render: Profile ---- */
  var PROF_N = 180, profSamples = [], profScrub = 0;
  function buildProfile(){
    var T = totals();
    profSamples = [];
    if (!T.legs.length) return T;
    var step = T.nm / PROF_N, acc = 0, li = 0, within = 0;
    for (var s = 0; s <= PROF_N; s++){
      var target = s * step;
      while (li < T.legs.length - 1 && target > acc + T.legs[li].nm){ acc += T.legs[li].nm; li++; }
      within = (target - acc) / T.legs[li].nm;
      var p = interp(T.legs[li].a, T.legs[li].b, Math.max(0, Math.min(1, within)));
      profSamples.push({ d: target, e: terrainAt(p.lat, p.lon) });
    }
    return T;
  }
  function profileHTML(){
    buildProfile();
    if (!profSamples.length) return '<div class="chipempty">Add at least two points.</div>';
    return '<div class="prof" id="profBox"></div><div class="profstats" id="profStats"></div>';
  }

  /* Paint into stable containers so the drag listener survives a repaint. */
  function profPaint(){
    var box = $('#profBox'); if (!box) return;
    var T = totals();
    var W = 340, H = 190, PAD = 26;
    var maxE = Math.max(AC.alt + 1500,
                Math.max.apply(null, profSamples.map(function(s){ return s.e; })) + 900);
    var x = function(d){ return PAD + (d / T.nm) * (W - PAD - 6); };
    var y = function(e){ return H - 16 - (e / maxE) * (H - 30); };

    var d = 'M' + x(0) + ',' + (H - 16);
    profSamples.forEach(function(s){ d += ' L' + x(s.d).toFixed(1) + ',' + y(s.e).toFixed(1); });
    d += ' L' + x(T.nm) + ',' + (H - 16) + ' Z';

    var hi = 0, hiD = 0;
    profSamples.forEach(function(s){ if (s.e > hi){ hi = s.e; hiD = s.d; } });
    var clr = AC.alt - hi;

    var ticks = '<line x1="' + x(0) + '" y1="14" x2="' + x(0) + '" y2="' + (H-16)
              + '" stroke="#2a3744" stroke-width="1"/>';
    var cum = 0;
    T.legs.forEach(function(l){
      cum += l.nm;
      ticks += '<line x1="' + x(cum).toFixed(1) + '" y1="14" x2="' + x(cum).toFixed(1)
             + '" y2="' + (H-16) + '" stroke="#2a3744" stroke-width="1"/>';
    });

    var sx = x(profScrub * T.nm);
    var se = profSamples[Math.round(profScrub * PROF_N)] || profSamples[0];

    box.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">'
      + '<path d="' + d + '" fill="rgba(127,179,213,.16)" stroke="#7fb3d5" stroke-width="1.2"/>'
      + ticks
      + '<line x1="' + PAD + '" y1="' + y(AC.alt).toFixed(1) + '" x2="' + (W-6) + '" y2="' + y(AC.alt).toFixed(1)
      +   '" stroke="#ffb020" stroke-width="1.4" stroke-dasharray="5 4"/>'
      + '<line x1="' + sx.toFixed(1) + '" y1="6" x2="' + sx.toFixed(1) + '" y2="' + (H-16)
      +   '" stroke="#dce6f0" stroke-width="1"/>'
      + '<circle cx="' + sx.toFixed(1) + '" cy="' + y(se.e).toFixed(1) + '" r="3.5" fill="#dce6f0"/>'
      + '<text x="4" y="' + (y(AC.alt) - 4).toFixed(1) + '" fill="#ffb020" font-size="9" '
      +   'font-family="monospace">' + (AC.alt/1000) + 'k</text>'
      + '</svg>';

    $('#profStats').innerHTML =
        '<div><span class="k">At cursor</span><span class="v">' + se.e.toLocaleString() + '</span></div>'
      + '<div><span class="k">Cursor clr</span><span class="v' + ((AC.alt - se.e) < SET.clr ? ' warn' : '') + '">'
      +   Math.round(AC.alt - se.e).toLocaleString() + '</span></div>'
      + '<div><span class="k">Dist along</span><span class="v">' + (profScrub * T.nm).toFixed(1) + '</span></div>'
      + '<div><span class="k">Highest pt</span><span class="v">' + hi.toLocaleString() + '</span></div>'
      + '<div><span class="k">Clearance</span><span class="v' + (clr < SET.clr ? ' warn' : '') + '">'
      +   clr.toLocaleString() + '</span></div>'
      + '<div><span class="k">At</span><span class="v">' + hiD.toFixed(1) + ' nm</span></div>';
  }

  /* ---- strip: one number dominant ---- */
  function stripHTML(){
    var T = totals();
    var resKg = AC.burn * (AC.resMin / 60);
    var low = T.rem < resKg;
    return '<div class="hero"><span class="k">Fuel on arrival</span>'
      + '<span class="v' + (low ? ' warn' : '') + '">' + Math.round(T.rem) + '<u>kg</u></span></div>'
      + '<div class="minis">'
      +   '<div class="mini"><span class="k">Dist</span><span class="v">' + T.nm.toFixed(0) + '</span></div>'
      +   '<div class="mini"><span class="k">ETE</span><span class="v">' + hhmm(T.hr) + '</span></div>'
      +   '<div class="mini"><span class="k">ETA</span><span class="v">' + clock(T.hr) + '</span></div>'
      + '</div>';
  }

  function drawFpl(){
    $('#fplBody').innerHTML = fplTab === 'route'   ? routeHTML()
                            : fplTab === 'navlog'  ? navlogHTML()
                            : profileHTML();
    $('#fplStrip').innerHTML = stripHTML();
    if (fplTab === 'route'){
      $$('#fplBody .chip[data-ci]').forEach(function(c){
        var i = parseInt(c.getAttribute('data-ci'), 10);
        c.addEventListener('click', function(){
          if (dragJustEnded){ dragJustEnded = false; return; }
          openChip(i);
        });
        c.addEventListener('touchstart', function(e){ dragStart(e, i); }, { passive:true });
      });
      var add = $('#chipAdd');
      if (add) add.addEventListener('click', function(){ openAdd(ROUTE.length); });
    }
    if (fplTab === 'navlog'){
      $$('#fplBody .lgc[data-li]').forEach(function(c){
        c.addEventListener('click', function(){
          toWpt = parseInt(c.getAttribute('data-li'), 10) + 1;
          drawFpl();
        });
      });
    }
    if (fplTab === 'profile'){ profPaint(); wireScrub(); }
    drawLegs();
  }

  /* ---- drag to reorder route chips ----------------------------
     Long-press 260ms to pick up, then drag. Move handlers live on
     `document` so the live re-render can replace the chip nodes
     under the finger without killing the gesture.               */
  var dragI = -1, dragTimer = null, dragFrom = null, dragging = false, dragJustEnded = false;

  function dragStart(e, i){
    var t = e.touches[0];
    dragFrom = [t.clientX, t.clientY];
    dragTimer = setTimeout(function(){
      dragging = true; dragI = i; drawFpl();
      if (navigator.vibrate) navigator.vibrate(8);
    }, 260);
    document.addEventListener('touchmove', dragMove, { passive:false });
    document.addEventListener('touchend', dragEnd);
    document.addEventListener('touchcancel', dragEnd);
  }
  function dragMove(e){
    var t = e.touches[0];
    if (!dragging){
      if (Math.abs(t.clientX - dragFrom[0]) > 8 || Math.abs(t.clientY - dragFrom[1]) > 8) dragEnd();
      return;
    }
    e.preventDefault();
    var chips = $$('#fplBody .chip[data-ci]');
    for (var k = 0; k < chips.length; k++){
      var r = chips[k].getBoundingClientRect();
      if (t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom){
        if (k !== dragI){
          ROUTE.splice(k, 0, ROUTE.splice(dragI, 1)[0]);
          dragI = k;
          drawFpl();
        }
        break;
      }
    }
  }
  function dragEnd(){
    clearTimeout(dragTimer);
    document.removeEventListener('touchmove', dragMove);
    document.removeEventListener('touchend', dragEnd);
    document.removeEventListener('touchcancel', dragEnd);
    if (dragging){ dragging = false; dragI = -1; dragJustEnded = true; drawFpl(); }
  }

  /* The scrubber repaints the SVG on every move, which detaches the
     node the touch started on. iOS keeps dispatching touchmove to that
     detached node, so a listener on the box stops hearing it. The move
     handlers therefore live on `document` for the life of the gesture. */
  function wireScrub(){
    var box = $('#profBox'); if (!box) return;
    function at(x){
      var r = box.getBoundingClientRect();
      profScrub = Math.max(0, Math.min(1, (x - r.left) / r.width));
      profPaint();
    }
    function begin(x){
      at(x);
      function tm(ev){ ev.preventDefault(); at(ev.touches[0].clientX); }
      function mm(ev){ at(ev.clientX); }
      function end(){
        document.removeEventListener('touchmove', tm);
        document.removeEventListener('touchend', end);
        document.removeEventListener('touchcancel', end);
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', end);
      }
      document.addEventListener('touchmove', tm, { passive:false });
      document.addEventListener('touchend', end);
      document.addEventListener('touchcancel', end);
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', end);
    }
    box.addEventListener('touchstart', function(e){ e.preventDefault(); begin(e.touches[0].clientX); }, { passive:false });
    box.addEventListener('mousedown',  function(e){ e.preventDefault(); begin(e.clientX); });
  }

  /* ---- FPL open / tabs / tools ---- */
  var drop = $('#dropFpl');
  var FPL_KEY = 'nmp.iphone.fplh', FPL_MIN = 250, fplMax = 400;
  var fplFrac = (function(){
    try{ var v = parseFloat(localStorage.getItem(FPL_KEY)); if (v > 0.2 && v <= 1) return v; }catch(e){}
    return 0.72;
  })();
  function saveFplH(){ try{ localStorage.setItem(FPL_KEY, String(fplFrac)); }catch(e){} }

  /* Fixed height, scrolling body. The panel must not resize when you
     switch tabs - only when you drag the grip. */
  function sizeDrop(){
    var top  = $('#chrome').getBoundingClientRect().bottom;
    var tabH = document.querySelector('.tabs').getBoundingClientRect().height;
    fplMax = Math.max(FPL_MIN, window.innerHeight - top - tabH - 10);
    var h = Math.max(FPL_MIN, Math.min(fplMax, Math.round(fplFrac * fplMax)));
    drop.style.top = top + 'px';
    drop.style.height = h + 'px';
  }

  /* ---- resize grip ---- */
  (function(){
    var grip = $('#fplGrip');
    function begin(clientY){
      var startY = clientY, startH = drop.getBoundingClientRect().height;
      grip.classList.add('on');
      function move(y){
        var h = Math.max(FPL_MIN, Math.min(fplMax, startH + (y - startY)));
        drop.style.height = h + 'px';
        fplFrac = h / fplMax;
      }
      function tm(ev){ ev.preventDefault(); move(ev.touches[0].clientY); }
      function mm(ev){ move(ev.clientY); }
      function end(){
        grip.classList.remove('on'); saveFplH();
        document.removeEventListener('touchmove', tm);
        document.removeEventListener('touchend', end);
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', end);
      }
      document.addEventListener('touchmove', tm, { passive:false });
      document.addEventListener('touchend', end);
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', end);
    }
    grip.addEventListener('touchstart', function(e){ e.preventDefault(); begin(e.touches[0].clientY); }, { passive:false });
