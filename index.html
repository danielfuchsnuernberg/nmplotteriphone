  /* ============================================================
     RADIO - frequencies in the order you will fly them
     Derived from the route. Aerodrome frequencies come from the live
     dataset. Enroute sectors are NOT modelled here: the panel shows
     the CNTR/RDO frequencies published at the adjoining fields and
     says so. In the real build this reads AIP ENR 2 sectors.
     ============================================================ */
  var FQ_ORDER = ['ATIS','APP','DEP','TWR','GND','MTAF','CTAF','RDO','CNTR'];
  function fqRank(d){
    var u = d.toUpperCase();
    for (var i = 0; i < FQ_ORDER.length; i++) if (u.indexOf(FQ_ORDER[i]) >= 0) return i;
    return 99;
  }
  function fqPrimary(d){
    var u = d.toUpperCase();
    return u.indexOf('TWR') >= 0 || u.indexOf('CTAF') >= 0 || u.indexOf('MTAF') >= 0;
  }
  function fqEnroute(fi){
    if (!fi) return [];
    return fi.freq.filter(function(r){
      var u = r[0].toUpperCase();
      return u.indexOf('CNTR') >= 0 || u.indexOf('RDO') >= 0;
    });
  }

  function radHTML(){
    if (ROUTE.length < 1) return '<div class="chipempty">No route. Build one in FPL.</div>';
    var h = '', T = totals();
    ROUTE.forEach(function(p, i){
      var fi = p.id ? FIELD_INFO[p.id] : null;
      var role = (i === 0) ? 'Departure' : (i === ROUTE.length - 1) ? 'Destination' : 'Enroute point';
      h += '<div class="fqp' + (i === toWpt ? ' act' : '') + '">'
        +  '<div class="fqh"><span class="ix">' + (i + 1) + '</span>'
        +  '<b>' + label(p) + '</b><span>' + role + '</span></div>';
      if (fi){
        fi.freq.slice().sort(function(a, b){ return fqRank(a[0]) - fqRank(b[0]); })
          .forEach(function(r){
            h += '<button class="fqr' + (fqPrimary(r[0]) ? ' pri' : '') + '" data-f="' + r[1] + '">'
               + '<span class="t">' + r[0] + '</span><span class="f">' + r[1] + '</span></button>';
          });
      } else {
        h += '<div class="fqnone">'
          +  (p.cat === 'strip' ? 'No published frequency &mdash; expect CTAF/MTAF, confirm before departure'
                                : 'No published frequency at this point') + '</div>';
      }
      h += '</div>';

      if (i < ROUTE.length - 1){
        var leg = T.legs[i];
        var en = fqEnroute(FIELD_INFO[p.id]).concat(fqEnroute(FIELD_INFO[ROUTE[i+1].id]));
        var seen = {}, uniq = [];
        en.forEach(function(r){ if (!seen[r[1]]){ seen[r[1]] = 1; uniq.push(r); } });
        h += '<div class="fqleg"><span class="d">' + (leg ? leg.nm.toFixed(0) + ' nm' : '') + '</span>'
          +  '<span class="e">' + (uniq.length
               ? uniq.map(function(r){ return r[0] + ' ' + r[1]; }).join('  \u00b7  ')
               : 'Enroute frequency not in this shell') + '</span></div>';
      }
    });
    return h + '<div class="cnote">Aerodrome frequencies are from the live NM Plotter dataset. '
      + 'Enroute entries are the CNTR/RDO frequencies published at the adjoining fields, not FIR '
      + 'sector boundaries &mdash; those come from AIP ENR 2 in the real build. '
      + 'Tap a frequency to copy it. Advisory only.</div>';
  }

    function list(q){
      q = (q || '').trim().toUpperCase();
      var h = '';

      /* a query that parses as a coordinate is offered directly */
      var cm = q.match(/^([NS]\s*\d[\d\s.\u00b0]*)[,/ ]+([EW]\s*\d[\d\s.\u00b0]*)$/);
      if (cm){

      var hits = DB.filter(function(p){
        if (!q) return true;
        return (p.id && p.id.toUpperCase().indexOf(q) >= 0)
            || (p.ia && p.ia.toUpperCase().indexOf(q) === 0)

      CAT_ORDER.forEach(function(c){

      if (la === null || lo === null){ toast('Use S06 34.2 / E146 43.6'); return; }

  /* Accepts "S06 34.2", "S06°34.2'", "S0634.2", "S06". Without a
     separator the degrees are fixed width (2 for lat, 3 for lon), so
     "S0634.2" cannot be misread as 63 degrees. */
  function parseDDM(s, isLat){
    if (!s) return null;
    var t = String(s).trim().toUpperCase().replace(/[\u00b0'"]/g, ' ').replace(/\s+/g, ' ');
    var m = t.match(/^([NSEW]) ?(.+)$/);
    if (!m) return null;
    var sign = (m[1] === 'S' || m[1] === 'W') ? -1 : 1;
    if ((isLat && m[1] !== 'N' && m[1] !== 'S') || (!isLat && m[1] !== 'E' && m[1] !== 'W')) return null;
    var rest = m[2].trim(), dStr, mStr;
    if (rest.indexOf(' ') >= 0){
      var parts = rest.split(' ');
      dStr = parts[0]; mStr = parts[1] || '0';
    } else {
      var w = isLat ? 2 : 3;
      if (rest.length <= w){ dStr = rest; mStr = '0'; }
      else { dStr = rest.slice(0, w); mStr = rest.slice(w); }
    }
    if (!/^\d{1,3}$/.test(dStr) || !/^\d{1,2}(\.\d+)?$/.test(mStr)) return null;
    var mm = parseFloat(mStr);
    if (mm >= 60) return null;
    var v = parseInt(dStr, 10) + mm / 60;
    if (isLat && v > 90) return null;
    if (!isLat && v > 180) return null;
    return sign * v;
  }

  function dmsStr(v, isLat){
    var h = isLat ? (v < 0 ? 'S' : 'N') : (v < 0 ? 'W' : 'E');
    var a = Math.abs(v), d = Math.floor(a);
    var mf = (a - d) * 60, m = Math.floor(mf), s = Math.round((mf - m) * 60);
    if (s === 60){ s = 0; m += 1; }
    if (m === 60){ m = 0; d += 1; }
    return h + ' ' + String(d).padStart(isLat ? 2 : 3, '0')
         + '\u00b0' + String(m).padStart(2, '0') + '\'' + String(s).padStart(2, '0') + '"';
  }
  function ddmStr(v, isLat){
    var h = isLat ? (v < 0 ? 'S' : 'N') : (v < 0 ? 'W' : 'E');
    var a = Math.abs(v), d = Math.floor(a), m = (a - d) * 60;
    if (m >= 59.995){ m = 0; d += 1; }
    return h + ' ' + String(d).padStart(isLat ? 2 : 3, '0')
         + '\u00b0' + (m < 10 ? '0' : '') + m.toFixed(2) + '\'';
  }
  function gpsRole(i){

  /* ---- sun times: real NOAA calculation, PNG is UTC+10 ---- */
  function sunTimes(lat, lon, date){
    var rad = Math.PI / 180;
    var start = Date.UTC(date.getUTCFullYear(), 0, 0);
    var doy = Math.floor((date.getTime() - start) / 86400000);
    var g = 2 * Math.PI / 365 * (doy - 1 + 0.5);
    var eq = 229.18 * (0.000075 + 0.001868*Math.cos(g) - 0.032077*Math.sin(g)
           - 0.014615*Math.cos(2*g) - 0.040849*Math.sin(2*g));
    var dec = 0.006918 - 0.399912*Math.cos(g) + 0.070257*Math.sin(g)
            - 0.006758*Math.cos(2*g) + 0.000907*Math.sin(2*g)
            - 0.002697*Math.cos(3*g) + 0.00148*Math.sin(3*g);
    var c = Math.cos(90.833 * rad) / (Math.cos(lat*rad) * Math.cos(dec)) - Math.tan(lat*rad) * Math.tan(dec);
    if (c < -1 || c > 1) return null;
    var haDeg = Math.acos(c) / rad;
    return [720 - 4*(lon + haDeg) - eq, 720 - 4*(lon - haDeg) - eq];   /* minutes UTC */
  }
  function hhmmLocal(minUTC, offsetMin){
    var t = ((Math.round(minUTC + offsetMin) % 1440) + 1440) % 1440;
    return String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
  }

  /* ---- METAR helpers ---- */
  function wxCat(m){
    if (!m) return ['—','var(--text-fainter)'];
    var vis = 9999, bkn = 9999;
    var v = m.match(/\s(\d{4})\s/); if (v) vis = parseInt(v[1], 10);
    var c = m.match(/(BKN|OVC)(\d{3})/); if (c) bkn = parseInt(c[2], 10) * 100;
    if (vis < 1600 || bkn < 500)  return ['LIFR','#d65db1'];
    if (vis < 5000 || bkn < 1000) return ['IFR','var(--bad)'];
    if (vis < 8000 || bkn < 3000) return ['MVFR','#2b8cff'];
    return ['VFR','var(--good)'];
  }
  function metarWind(m){
    var w = m && m.match(/\s(\d{3}|VRB)(\d{2})(G\d{2})?KT/);
    if (!w) return null;
    return { dir: w[1] === 'VRB' ? null : parseInt(w[1], 10), kt: parseInt(w[2], 10) };
  }

  /* ---- tabs ---- */
  function cardInfo(f, fi){

    h += '<div class="csec">Position</div>'
      +  '<div class="kv"><span class="k">Latitude</span><span class="v amb">' + ddm(f.lat, true) + '</span></div>'
      +  '<div class="kv"><span class="k">Longitude</span><span class="v amb">' + ddm(f.lon, false) + '</span></div>';

    if (ROUTE.length){

  function kvWind(m){

      + (w ? (w.dir === null ? 'Variable' : String(w.dir).padStart(3,'0') + '\u00b0') + ' / ' + w.kt + ' kt' : '\u2014')

  function cardRwy(f, fi){
    if (!fi) return '<div class="cempty">Not in demo data</div>';
    var w = metarWind(fi.metar), h = '';
    fi.rwy.forEach(function(r){
      var m = rwyLenM(r);

        + '<span>' + r.b.toFixed(0) + '\u00b0 true</span></div>'
        + '<div class="rwyg">'
        + '<div><span class="k">Length</span><span class="v">' + m.toLocaleString() + ' m</span></div>'
        + '<div><span class="k">Feet</span><span class="v">' + Math.round(m * 3.28084).toLocaleString() + '</span></div>'
        + '<div><span class="k">Bearing</span><span class="v">' + r.b.toFixed(0) + '\u00b0</span></div>'
        + '</div>';
      if (w && w.dir !== null){
        h += '<div class="csec" style="margin-top:12px">Wind component</div><div class="rwyg">';
        [[r.l, r.b], [r.h, (r.b + 180) % 360]].forEach(function(end){
          var d = ((w.dir - end[1] + 540) % 360) - 180;
          var head = w.kt * Math.cos(d * Math.PI / 180);
          var cross = Math.abs(w.kt * Math.sin(d * Math.PI / 180));
          h += '<div><span class="k">Rwy ' + end[0] + '</span>'
             + '<span class="v ' + (head >= 0 ? 'ok' : 'warn') + '">'
             + (head >= 0 ? 'H' : 'T') + Math.abs(head).toFixed(0)
             + ' X' + cross.toFixed(0) + '</span></div>';
        });
        h += '</div>';
      }
      h += '</div>';
    });
    return h + '<div class="cnote">Runway data from the live NM Plotter dataset; lengths derived '
      + 'from threshold coordinates. H = headwind, T = tailwind, X = crosswind, from the demo METAR above.</div>';

      + '<button data-ca="ctr" style="color:var(--accent-2)">Centre</button>'
      + (fi ? '<button data-ca="freq" style="color:var(--navaid)">Freqs</button>' : '');

    /* Only aerodromes have weather, runways, procedures and NOTAMs. */
    if (!fi) cardTab = 'info';
    $('#cardTabs').classList.toggle('off', !fi);
    $('#cardTabs').innerHTML = !fi ? '' : CARD_TABS.map(function(t){
      return '<button data-ct="' + t[0] + '"' + (cardTab === t[0] ? ' class="on"' : '') + '>' + t[1] + '</button>';
    }).join('');

    var sub = $('#cardSub');
    sub.classList.toggle('off', cardTab !== 'wx');
    if (cardTab === 'wx'){
      sub.innerHTML = WX_SUBS.map(function(s){
        return '<button data-cs="' + s[0] + '"' + (cardSub === s[0] ? ' class="on"' : '') + '>' + s[1] + '</button>';
      }).join('');
    }

    $('#cardBody').innerHTML =
        cardTab === 'info' ? cardInfo(f, fi)
      : cardTab === 'wx'   ? cardWx(f, fi)
      : cardTab === 'rwy'  ? cardRwy(f, fi)
      : cardTab === 'proc' ? cardProc(f)
      :                      cardNtm(f);

    $$('#cardTabs button').forEach(function(b){
      b.addEventListener('click', function(){ cardTab = b.getAttribute('data-ct'); drawCard(); });
    });
    $$('#cardSub button').forEach(function(b){
      b.addEventListener('click', function(){ cardSub = b.getAttribute('data-cs'); drawCard(); });
    });
    $$('#cardAct button').forEach(function(b){
      b.addEventListener('click', function(){ cardAction(b.getAttribute('data-ca'), f); });
    });
  }

  function cardAction(a, f){
    if (a === 'dct'){
      var at = ROUTE.findIndex(function(p){ return p.id === f.id; });
      if (at < 0){
        at = Math.max(1, Math.min(toWpt, ROUTE.length));
        ROUTE.splice(at, 0, { id:f.id, nm:f.nm, cat:f.cat, lat:f.lat, lon:f.lon });
      }
      toWpt = at; drawFpl(); toast('Direct to ' + f.id);
      return;
    }
    if (a === 'add'){
      if (ROUTE.some(function(p){ return p.id === f.id; })){ toast(f.id + ' is already in the route'); return; }
      ROUTE.push({ id:f.id, nm:f.nm, cat:f.cat, lat:f.lat, lon:f.lon });
      drawFpl(); drawCard(); toast(f.id + ' added to route');
      return;
    }
    if (a === 'freq'){ cardTab = 'info'; drawCard();
      var s = $('#cardBody').querySelectorAll('.csec');
      if (s[2]) s[2].scrollIntoView({ block:'start', behavior:'smooth' });
      return;
    }
    if (a === 'ctr'){ card.classList.remove('on'); flashPoint(f); return; }
    toast('Placeholder');
  }

  /* The demo map is a placeholder, so "Centre" drops a pulsing marker
     at the point's position within a PNG bounding box rather than
     pretending to pan a real map. */
  var PNG_BOX = { n:-1.5, s:-11.0, w:140.0, e:156.0 };
  var flashT = null;
  function flashPoint(p){
    var old = document.querySelector('.mkflash'); if (old) old.remove();
    clearTimeout(flashT);
    var x = (p.lon - PNG_BOX.w) / (PNG_BOX.e - PNG_BOX.w);
    var y = (PNG_BOX.n - p.lat) / (PNG_BOX.n - PNG_BOX.s);
    var el = document.createElement('div');
    el.className = 'mkflash';
    el.style.left = Math.max(6, Math.min(94, x * 100)) + '%';
    el.style.top  = Math.max(8, Math.min(88, y * 100)) + '%';
    el.innerHTML = '<i></i><b>' + label(p) + '</b>';
    $('#map').appendChild(el);
    flashT = setTimeout(function(){ if (el.parentNode) el.remove(); }, 3200);
    toast('Centred on ' + label(p));
  }

  var cardAdHoc = null, cardOpenTs = 0;

    cardOpenTs = Date.now();
    cardAdHoc = null; cardId = id; cardTab = 'info';

  function openCardPoint(p){

  /* ---- card shell: fixed height, resizable, persisted ---- */
  var card = $('#card');
  var CARD_KEY = 'nmp.iphone.cardh', CARD_MIN = 280, cardMax = 500;
  var cardFrac = (function(){
    try{ var v = parseFloat(localStorage.getItem(CARD_KEY)); if (v > 0.2 && v <= 1) return v; }catch(e){}
    return 0.66;
  })();
  function sizeCard(){
    cardMax = Math.max(CARD_MIN, window.innerHeight - 120);
    card.style.height = Math.max(CARD_MIN, Math.min(cardMax, Math.round(cardFrac * cardMax))) + 'px';
  }
  (function(){
    var grip = $('#cardGrip');
    function begin(y0){
      var startH = card.getBoundingClientRect().height;
      grip.classList.add('on');
      function move(y){
        var h = Math.max(CARD_MIN, Math.min(cardMax, startH - (y - y0)));
        card.style.height = h + 'px';
        cardFrac = h / cardMax;
      }
      function tm(e){ e.preventDefault(); move(e.touches[0].clientY); }
      function mm(e){ move(e.clientY); }
      function end(){
        grip.classList.remove('on');
        try{ localStorage.setItem(CARD_KEY, String(cardFrac)); }catch(e){}
        document.removeEventListener('touchmove', tm);
        document.removeEventListener('touchend', end);
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', end);
      }
      document.addEventListener('touchmove', tm, { passive:false });
      document.addEventListener('touchend', end);
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', end);
    }
    grip.addEventListener('touchstart', function(e){ e.preventDefault(); begin(e.touches[0].clientY); }, { passive:false });
    grip.addEventListener('mousedown',  function(e){ e.preventDefault(); begin(e.clientY); });
  })();

  $$('.fld').forEach(function(f){
    f.addEventListener('click', function(){ openCard(f.getAttribute('data-fld')); });
  });
  $('#cardBack').addEventListener('click', function(){ card.classList.remove('on'); });

  /* Tap anywhere outside the card to dismiss it. Taps on a field dot
     pass through so they switch the card rather than closing it, and
     the timestamp guard stops the opening tap closing it again. */
  document.addEventListener('click', function(e){
    if (!card.classList.contains('on')) return;
    if (Date.now() - cardOpenTs < 350) return;
    if (card.contains(e.target)) return;
    if (e.target.closest && e.target.closest('.fld')) return;

  $('#cardStar').addEventListener('click', function(){

  function svg(k){

  var VIEWS = [

  var STORE_KEY = 'nmp.iphone.tabs';

    try{
      var s = localStorage.getItem(STORE_KEY);
      if (s){ var a = JSON.parse(s); if (a && a.length === 3) return a; }
    }catch(e){}

  /* ---------- view layer ---------- */

    if (viewCache[k]) return viewCache[k];

       + '<span class="ic">' + svg('more') + '</span>'

  /* ---------- Tab-bar editor ---------- */

  function drawEd(){

    for (var i = 0; i < 3; i++){
      s += '<button class="tslot' + (i === tedSlot ? ' sel' : '') + '" data-slot="' + i + '">'

  /* ============================================================
     QUICK FUEL CHECK  (ported from QuickFuelCheck 2026-06-16)
     ============================================================ */
  function fuelHTML(){
    function fld(lab, attrs){
      return '<div><span class="fsub">' + lab + '</span>'
           + '<input class="fin" type="number" inputmode="decimal" ' + attrs + '></div>';
    }
    return '<div class="vhead"><b>Quick Fuel Check</b><span class="sub">Jet A-1</span></div>'
      + '<div class="vbody">'
      + '<div class="fdens"><span class="k">Density &middot; kg/L</span>'
      +   '<input class="fin" data-f="dens" type="number" step="0.001" value="0.800" inputmode="decimal"></div>'

      + '<div class="fcard"><div class="flab">Unit converter</div><div class="fg2">'
      +   fld('Litres',    'data-u="L"')
      +   fld('US Gal',    'data-u="USG"')
      +   fld('Kilograms', 'data-u="kg"')
      +   fld('Pounds',    'data-u="lbs"')
      + '</div></div>'

      + '<div class="fcard"><div class="flab">Trip &rarr; required fuel</div><div class="fg3">'
      +   fld('Trip &middot; NM',  'data-f="trip" placeholder="270"')
      +   fld('TAS &middot; kt',   'data-f="tas"  placeholder="130"')
      +   fld('Burn &middot; kg/h','data-f="burn" placeholder="176"')
      + '</div>'
      + '<span class="fsub" style="margin-top:10px">Reserve &middot; min</span>'
      + '<div class="fseg" data-f="res"></div><div data-f="reqOut"></div></div>'

      + '<div class="fcard"><div class="flab">Endurance</div>'
      + '<span class="fsub">Fuel on board &middot; unit</span>'
      + '<div class="fseg" data-f="endU"></div>'
      + '<div class="fg2" style="margin-top:10px">'
      +   fld('Quantity',          'data-f="endQ" placeholder="800"')
      +   fld('Burn &middot; kg/h','data-f="endB" placeholder="176"')
      + '</div><div data-f="endOut"></div></div>'
      + '</div>';
  }

  function initFuel(root){
    var L_PER_USG = 3.78541, KG_PER_LB = 0.453592;
    var st = { density: 0.800, res: 15, endUnit: 'kg' };
    var q  = function(sel){ return root.querySelector(sel); };
    var qa = function(sel){ return Array.prototype.slice.call(root.querySelectorAll(sel)); };
    var f  = function(n, d){ return Number(n).toFixed(d === undefined ? 1 : d); };
    var num = function(sel){ return parseFloat(q(sel).value); };

    /* -- unit converter -- */
    var units = qa('input[data-u]');
    function convert(field, raw){
      var v = parseFloat(raw);
      if (raw === '' || isNaN(v)){
        units.forEach(function(i){ if (i.dataset.u !== field) i.value = ''; });
        return;
      }
      var L;
      if (field === 'L')   L = v;
      if (field === 'USG') L = v * L_PER_USG;
      if (field === 'kg')  L = v / st.density;
      if (field === 'lbs') L = (v * KG_PER_LB) / st.density;
      var vals = {
        L:   f(L, 1),
        USG: f(L / L_PER_USG, 2),
        kg:  f(L * st.density, 1),
        lbs: f((L * st.density) / KG_PER_LB, 1)
      };
      units.forEach(function(i){ if (i.dataset.u !== field) i.value = vals[i.dataset.u]; });
    }
    units.forEach(function(i){
      i.addEventListener('input', function(e){ convert(e.target.dataset.u, e.target.value); });
    });

    /* -- density -- */
    q('[data-f="dens"]').addEventListener('input', function(e){
      st.density = parseFloat(e.target.value) || 0.800;
      units.forEach(function(i){ i.value = ''; });
      req(); end();
    });

    /* -- trip -> required fuel -- */
    function req(){
      var t = num('[data-f="trip"]'), v = num('[data-f="tas"]'), b = num('[data-f="burn"]');
      var out = q('[data-f="reqOut"]');
      if (!(t > 0 && v > 0 && b > 0)){
        out.innerHTML = '<div class="fnone">Enter trip, TAS and burn</div>'; return;
      }
      var hr = t / v, trip = hr * b, resKg = b * (st.res / 60), tot = trip + resKg;
      var h = Math.floor(hr), m = Math.round((hr - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      out.innerHTML = '<div class="fout">'
        + '<div class="r"><span>Flight time</span><span>' + h + 'h ' + String(m).padStart(2,'0') + 'm</span></div>'
        + '<div class="r"><span>Reserve</span><span>' + (st.res === 0 ? 'NIL' : f(resKg,1) + ' kg') + '</span></div>'
        + '<div class="big">' + f(tot,0) + '<u>kg</u></div>'
        + '<div class="alt">' + f(tot/st.density,0) + ' L &middot; '
        + f((tot/st.density)/L_PER_USG,1) + ' USG</div></div>';
    }
    ['trip','tas','burn'].forEach(function(k){
      q('[data-f="' + k + '"]').addEventListener('input', req);
    });

    /* -- reserve segmented control -- */
    var RES = [0,15,20,30,45,60], resHost = q('[data-f="res"]');
    resHost.innerHTML = RES.map(function(r){
      return '<button data-r="' + r + '"' + (r === st.res ? ' class="on"' : '') + '>'
           + (r === 0 ? 'NIL' : r) + '</button>';
    }).join('');
    Array.prototype.forEach.call(resHost.children, function(b){
      b.addEventListener('click', function(){
        st.res = parseInt(b.getAttribute('data-r'), 10);
        Array.prototype.forEach.call(resHost.children, function(x){ x.classList.toggle('on', x === b); });
        req();
      });
    });

    /* -- endurance -- */
    var UNITS = ['kg','L','USG','lbs'], endHost = q('[data-f="endU"]');
    function toKg(v, u){
      if (u === 'lbs') return v * KG_PER_LB;
      if (u === 'L')   return v * st.density;
      if (u === 'USG') return v * L_PER_USG * st.density;
      return v;
    }
    endHost.innerHTML = UNITS.map(function(u){
      return '<button data-eu="' + u + '"' + (u === st.endUnit ? ' class="on"' : '') + '>' + u + '</button>';
    }).join('');
    Array.prototype.forEach.call(endHost.children, function(b){
      b.addEventListener('click', function(){
        st.endUnit = b.getAttribute('data-eu');
        Array.prototype.forEach.call(endHost.children, function(x){ x.classList.toggle('on', x === b); });
        end();
      });
    });
    function end(){
      var v = num('[data-f="endQ"]'), b = num('[data-f="endB"]');
      var out = q('[data-f="endOut"]');
      if (!(v > 0 && b > 0)){
        out.innerHTML = '<div class="fnone">Enter fuel on board and burn</div>'; return;
      }
      var kg = toKg(v, st.endUnit), hrs = kg / b;
      var h = Math.floor(hrs), m = Math.round((hrs - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      out.innerHTML = '<div class="fout">'
        + '<div class="r"><span>Fuel on board</span><span>' + f(kg,1) + ' kg</span></div>'
        + '<div class="big">' + h + '<u>h</u> ' + String(m).padStart(2,'0') + '<u>m</u></div>'
        + '<div class="alt">at ' + f(b,0) + ' kg/hr</div></div>';
    }
    ['endQ','endB'].forEach(function(k){
      q('[data-f="' + k + '"]').addEventListener('input', end);
    });

    req(); end();
  }

  renderTabs();
  showView(activeTab);

  /* ============================================================
     SEARCH
     Same matcher as the FPL point picker. Every result opens the
     card, so a fix or a village gets Direct-to and Add-to-route
     exactly like an aerodrome.
     ============================================================ */
  var sPanel = $('#searchPanel'), sIn = $('#searchIn'), sBox = $('#search');
  var REC_KEY = 'nmp.iphone.recents';
  function loadRec(){
    try{ var a = JSON.parse(localStorage.getItem(REC_KEY)); if (a && a.length) return a; }catch(e){}
    return [];
  }
  var recents = loadRec();
  function pushRec(id){
    recents = [id].concat(recents.filter(function(x){ return x !== id; })).slice(0, 8);
    try{ localStorage.setItem(REC_KEY, JSON.stringify(recents)); }catch(e){}
  }

  function sizeSearch(){
    var top  = $('#chrome').getBoundingClientRect().bottom;
    var tabH = document.querySelector('.tabs').getBoundingClientRect().height;
    sPanel.style.top = top + 'px';
    sPanel.style.height = Math.max(200, window.innerHeight - top - tabH) + 'px';
  }

  function searchRows(items, heading){
    var h = heading ? '<div class="wsec">' + heading + '</div>' : '';
    items.forEach(function(p){
      h += '<button class="wrow" data-sid="' + p.id + '">'
         + '<span class="id">' + p.id + '</span>'
         + '<span class="nm2">' + p.nm + '</span>'
         + '<span class="cat">' + (p.ia || CAT_SHORT[p.cat] || '') + '</span></button>';
    });
    return h;
  }

  function drawSearch(){
    var q = sIn.value.trim().toUpperCase(), h = '';
    $('#searchX').classList.toggle('on', !!q);

    if (!q){
      if (recents.length){
        var rs = recents.map(dbById).filter(Boolean);
        if (rs.length) h += searchRows(rs, 'Recent');
      }
      h += searchRows(DB.filter(function(p){ return p.cat === 'field'; }).slice(0, 8), 'Fields');
      $('#searchList').innerHTML = h;
      wireSearchRows();
      return;
    }

    var cm = q.match(/^([NS]\s*\d[\d\s.\u00b0]*)[,/ ]+([EW]\s*\d[\d\s.\u00b0]*)$/);
    if (cm){
      var la = parseDDM(cm[1], true), lo = parseDDM(cm[2], false);
      if (la !== null && lo !== null){
        h += '<div class="wsec">Coordinate</div>'
           + '<button class="wrow" data-scoord="' + la + ',' + lo + '">'
           + '<span class="id">GPS</span>'
           + '<span class="nm2">' + ddm(la, true) + ' ' + ddm(lo, false) + '</span>'
           + '<span class="cat">Open</span></button>';
      }
    }

    var hits = DB.filter(function(p){
      return (p.id && p.id.toUpperCase().indexOf(q) >= 0)
          || (p.ia && p.ia.toUpperCase().indexOf(q) === 0)
          || (p.nm && p.nm.toUpperCase().indexOf(q) >= 0);
    });
    CAT_ORDER.forEach(function(c){
      var inCat = hits.filter(function(p){ return p.cat === c; });
      if (inCat.length) h += searchRows(inCat, CAT_NM[c]);
    });
    if (!h) h = '<div class="chipempty">No match for &ldquo;' + q + '&rdquo;</div>';
    $('#searchList').innerHTML = h;
    wireSearchRows();
  }

  function wireSearchRows(){
    $$('#searchList .wrow').forEach(function(b){
      b.addEventListener('click', function(){
        var cd = b.getAttribute('data-scoord');
        if (cd){
          var pr = cd.split(',');
          closeSearch();
          openCardPoint({ id:null, nm:'Coordinate', cat:'mine',
                          lat:parseFloat(pr[0]), lon:parseFloat(pr[1]) });
          return;
        }
        var id = b.getAttribute('data-sid');
        pushRec(id);
        closeSearch();
        openCard(id);
      });
    });
  }

  function openSearch(){
    closeAll();
    sizeSearch();
    sBox.classList.add('on');
    sPanel.classList.add('on');
    drawSearch();
  }
  function closeSearch(){
    sPanel.classList.remove('on');
    sBox.classList.remove('on');
    sIn.blur();
  }
  sIn.addEventListener('focus', openSearch);
  sIn.addEventListener('input', function(){
    if (!sPanel.classList.contains('on')) openSearch(); else drawSearch();
  });
  sIn.addEventListener('keydown', function(e){
    if (e.key === 'Enter'){
      var first = $('#searchList .wrow');
      if (first) first.click();
    }
    if (e.key === 'Escape') closeSearch();
  });
  $('#searchX').addEventListener('click', function(){
    sIn.value = ''; drawSearch(); sIn.focus();
  });
  window.addEventListener('resize', function(){ if (sPanel.classList.contains('on')) sizeSearch(); });

  /* ============================================================
     SETTINGS - everything here changes real behaviour
     ============================================================ */
  var setV = $('#setView');
  function snum(v, d){ var n = parseFloat(v); return isNaN(n) ? d : n; }
  function etdStr(){ return String(Math.floor(ETD_MIN/60)).padStart(2,'0') + String(ETD_MIN%60).padStart(2,'0'); }

  function setRow(lab, sub, ctrl){
    return '<div class="setrow"><span class="lb">' + lab
         + (sub ? '<small>' + sub + '</small>' : '') + '</span>' + ctrl + '</div>';
  }
  function segCtrl(name, opts, cur){
    return '<span class="fseg" data-seg="' + name + '">' + opts.map(function(o){
      return '<button data-v="' + o[0] + '"' + (String(o[0]) === String(cur) ? ' class="on"' : '')
           + '>' + o[1] + '</button>';
    }).join('') + '</span>';
  }
  function inCtrl(name, val){
    return '<input class="fin" data-set="' + name + '" type="text" inputmode="decimal" value="' + val + '">';
  }
  function swiCtrl(name, on){
    return '<span class="swi' + (on ? ' on' : '') + '" data-swi="' + name + '"><i></i></span>';
  }

  function drawSet(){
    $('#setBody').innerHTML =
        '<div class="csec" style="margin-top:0">Aircraft</div>'
      + setRow('Registration', null, '<input class="fin" data-set="reg" type="text" value="' + AC.reg + '">')
      + setRow('Type', null, '<input class="fin" data-set="type" type="text" value="' + AC.type + '">')
      + setRow('Cruise TAS', 'kt', inCtrl('tas', AC.tas))
      + setRow('Fuel burn', 'kg per hour', inCtrl('burn', AC.burn))
      + setRow('Fuel on board', 'kg', inCtrl('fob', AC.fob))
      + setRow('Reserve', 'minutes', segCtrl('resMin', [[15,'15'],[30,'30'],[45,'45'],[60,'60']], AC.resMin))

      + '<div class="csec">Flight plan</div>'
      + setRow('Cruise altitude', 'feet', inCtrl('alt', AC.alt))
      + setRow('ETD', 'UTC, hhmm', '<input class="fin" data-set="etd" type="text" inputmode="numeric" value="' + etdStr() + '">')
      + setRow('Low clearance warning', 'NavLog and Profile turn red below this',
               segCtrl('clr', [[500,'500'],[1000,'1000'],[1500,'1500']], SET.clr))

      + '<div class="csec">Map</div>'
      + setRow('Airfield labels', 'declutter', segCtrl('labels', [['off','Off'],['auto','Auto'],['always','Always']], SET.labels))
      + setRow('Route line', null, swiCtrl('routeLine', SET.routeLine))

      + '<div class="csec">Units</div>'
      + setRow('Coordinate format', 'default for the GPS window',
               segCtrl('coordFmt', [['ddm', "D\u00b0M.M'"], ['dms', 'D\u00b0M\u2032S\u2033']], SET.coordFmt))

      + '<div class="csec">Layout</div>'
      + '<button class="setgo" data-go2="tabs">Edit bottom bar<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="acty">Edit activity bar<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="type">Type scale<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="metrics">Layout metrics<span class="ch">\u203a</span></button>'

      + '<div class="csec">About</div>'
      + setRow('Version', BUILD, '<span style="font-family:var(--mono);color:var(--accent)">' + VERSION + '</span>')
      + '<div class="cnote">NM Plotter is advisory only and is a backup to the certified '
      + 'avionics. Garmin remains primary at all times. Every data layer carries its AIP '
      + 'edition date. Not for navigation.</div>';

    $$('#setBody input[data-set]').forEach(function(el){
      el.addEventListener('change', function(){
        var k = el.getAttribute('data-set'), v = el.value;
        if (k === 'reg' || k === 'type'){ AC[k] = v.trim() || AC[k]; }
        else if (k === 'etd'){
          var m = String(v).replace(/\D/g, '').padStart(4, '0').slice(0, 4);
          var hh = parseInt(m.slice(0, 2), 10), mm = parseInt(m.slice(2), 10);
          if (hh < 24 && mm < 60) ETD_MIN = hh * 60 + mm; else toast('ETD must be 0000-2359');
        }
        else AC[k] = snum(v, AC[k]);
        saveSet(); drawSet(); drawFpl();
      });
    });
    $$('#setBody .fseg').forEach(function(g){
      var name = g.getAttribute('data-seg');
      Array.prototype.forEach.call(g.children, function(b){
        b.addEventListener('click', function(){
          var v = b.getAttribute('data-v');
          if (name === 'resMin')      AC.resMin = parseInt(v, 10);
          else if (name === 'clr')    SET.clr = parseInt(v, 10);
          else { SET[name] = v; if (name === 'coordFmt') gpsFmt = v; }
          saveSet(); drawSet(); drawFpl(); applyMapOpts();
        });
      });
    });
    $$('#setBody .swi').forEach(function(s){
      s.addEventListener('click', function(){
        SET[s.getAttribute('data-swi')] = !SET[s.getAttribute('data-swi')];
        saveSet(); drawSet(); applyMapOpts();
      });
    });
    $$('#setBody .setgo').forEach(function(b){
      b.addEventListener('click', function(){
        var k = b.getAttribute('data-go2');
        closeSet();
        if (k === 'tabs')    openEd();
        if (k === 'acty')    openActEd();
        if (k === 'type')    openType();
        if (k === 'metrics') showMetrics();
      });
    });
  }

  function openSet(){ closeAll(); drawSet(); setV.classList.add('on'); }
  function closeSet(){ setV.classList.remove('on'); }
  $('#setClose').addEventListener('click', closeSet);

  /* ---------- misc stubs ---------- */
  $('#tbSet').addEventListener('click', openSet);
  ['#tbProf'].forEach(function(sel){
    $(sel).addEventListener('click', function(){ closeAll(); toast('Placeholder'); });
  });

  /* ---------- Track my position: Off -> Centre -> Follow ---------- */
  var LOC_STATES = ['Off', 'Centred', 'Follow \u00b7 track up'];
  var locState = 0;
  $('#tbLoc').addEventListener('click', function(){
    locState = (locState + 1) % LOC_STATES.length;
    $('#tbLoc').classList.toggle('on', locState > 0);
    toast('Own position: ' + LOC_STATES[locState]);
  });

  /* ---------- Layout metrics overlay ---------- */
  var mxOn = false;
  function showMetrics(){
    var mx = $('#mx');
    if (mxOn){ mx.classList.remove('on'); mx.innerHTML = ''; mxOn = false; return; }
    var bands = [
      ['#chrome',  'top chrome'],
      ['#map',     'map'],
      ['#acty',    'activity bar'],
      ['.tabs',    'tab bar']
    ];
    var h = '';
    bands.forEach(function(b){
      var el = $(b[0]); if (!el) return;
      var r = el.getBoundingClientRect();
      h += '<div class="mxb" style="top:' + Math.round(r.top) + 'px;height:' + Math.round(r.height) + 'px"></div>'
         + '<div class="mxl" style="top:' + (Math.round(r.top) + 3) + 'px">'
         + b[1] + ' ' + Math.round(r.height) + 'px</div>';
    });
    var sat = getComputedStyle(document.documentElement).getPropertyValue('--sat');
    h += '<div class="mxl" style="top:3px;left:6px;right:auto">viewport '
       + window.innerWidth + '\u00d7' + window.innerHeight
       + ' \u00b7 safe-top ' + sat.trim() + ' \u00b7 ' + VERSION + '</div>';
    mx.innerHTML = h;
    mx.classList.add('on');
    mxOn = true;
    setTimeout(function(){ mx.classList.remove('on'); mx.innerHTML = ''; mxOn = false; }, 6000);
  }

  /* ---------- map placeholder options ---------- */
  function applyMapOpts(){
    $$('.fld b').forEach(function(el){
      el.style.display = (SET.labels === 'off') ? 'none' : '';
      el.style.opacity = (SET.labels === 'auto') ? '.75' : '1';
    });
    $$('.leg').forEach(function(el){ el.style.display = SET.routeLine ? '' : 'none'; });
  }

  /* ---------- offline: register the paired service worker ----------
     Guarded so the file still runs from file:// or a preview, where
     there is no SW scope. The cache name is namespaced to this repo
     so it can never evict the live NM Plotter shell. */
  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){ /* offline-only, non-fatal */ });
    });
  }

  /* ---------- fake route legs between the airfield dots ---------- */
  function drawLegs(){
    var map = $('#map');
    Array.prototype.forEach.call(map.querySelectorAll('.leg'), function(l){ l.remove(); });
    var pts = $$('.fld').map(function(f){
      return { x: f.offsetLeft, y: f.offsetTop };
    });
    var order = [0, 1, 2];
    for (var i = 0; i < order.length - 1; i++){
      var a = pts[order[i]], b = pts[order[i+1]];
      var dx = b.x - a.x, dy = b.y - a.y;
      var len = Math.sqrt(dx*dx + dy*dy);
      var ang = Math.atan2(dy, dx) * 180 / Math.PI;
      var el = document.createElement('div');
      el.className = 'leg';
      el.style.left = a.x + 'px';
      el.style.top = a.y + 'px';
      el.style.width = len + 'px';
      el.style.transform = 'rotate(' + ang + 'deg)';
      map.insertBefore(el, map.querySelector('.fld'));
    }
    applyMapOpts();
  }
  window.addEventListener('resize', drawLegs);
  setTimeout(drawLegs, 60);

})();
</script>
</body>
</html>
