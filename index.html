  function terrPaint(){
    var box = $('#terrBox'); if (!box) return;
    var T = totals();
    var W = 340, H = 250, PADL = 30, PADR = 8, TOP = 12, BOT = 20;
    var maxE = Math.max(AC.alt + 2000,
                Math.max.apply(null, profSamples.map(function(s){ return s.e; })) + 1200);
    var x = function(d){ return PADL + (d / T.nm) * (W - PADL - PADR); };
    var y = function(e){ return H - BOT - (e / maxE) * (H - TOP - BOT); };
    var floor = AC.alt - SET.clr;

    var d = 'M' + x(0) + ',' + (H - BOT);
    profSamples.forEach(function(s){ d += ' L' + x(s.d).toFixed(1) + ',' + y(s.e).toFixed(1); });
    d += ' L' + x(T.nm) + ',' + (H - BOT) + ' Z';

    var hi = 0, hiD = 0;
    profSamples.forEach(function(s){ if (s.e > hi){ hi = s.e; hiD = s.d; } });

    /* altitude grid */
    var grid = '';
    for (var a = 0; a <= maxE; a += 2000){
      grid += '<line x1="' + PADL + '" y1="' + y(a).toFixed(1) + '" x2="' + (W - PADR)
           +  '" y2="' + y(a).toFixed(1) + '" stroke="#1a2330" stroke-width="1"/>'
           +  '<text x="2" y="' + (y(a) + 3).toFixed(1) + '" fill="#5f7186" font-size="8" '
           +  'font-family="monospace">' + (a / 1000) + 'k</text>';
    }

    /* waypoint ticks and labels */
    var ticks = '', cum = 0;
    ROUTE.forEach(function(p, i){
      if (i > 0) cum += T.legs[i-1].nm;
      var px = x(cum);
      ticks += '<line x1="' + px.toFixed(1) + '" y1="' + TOP + '" x2="' + px.toFixed(1)
            +  '" y2="' + (H - BOT) + '" stroke="#2a3744" stroke-width="1"/>'
            +  '<text x="' + px.toFixed(1) + '" y="' + (H - 6) + '" fill="#8a9bb0" font-size="8" '
            +  'font-family="monospace" text-anchor="' + (i === 0 ? 'start' : (i === ROUTE.length - 1 ? 'end' : 'middle'))
            +  '">' + (p.id || '\u2022') + '</text>';
    });

    var sx = x(profScrub * T.nm);
    var se = profSamples[Math.round(profScrub * PROF_N)] || profSamples[0];

    box.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">'
      + '<defs><clipPath id="tclip"><path d="' + d + '"/></clipPath></defs>'
      + grid
      + '<path d="' + d + '" fill="rgba(127,179,213,.30)" stroke="#7fb3d5" stroke-width="1.2"/>'
      + '<rect x="0" y="0" width="' + W + '" height="' + Math.max(0, y(floor)).toFixed(1)
      +   '" clip-path="url(#tclip)" fill="rgba(240,80,110,.45)"/>'
      + ticks
      + '<line x1="' + PADL + '" y1="' + y(floor).toFixed(1) + '" x2="' + (W - PADR) + '" y2="' + y(floor).toFixed(1)
      +   '" stroke="#f0506e" stroke-width="1" stroke-dasharray="3 3"/>'
      + '<line x1="' + PADL + '" y1="' + y(AC.alt).toFixed(1) + '" x2="' + (W - PADR) + '" y2="' + y(AC.alt).toFixed(1)
      +   '" stroke="#ffb020" stroke-width="1.6" stroke-dasharray="6 4"/>'
      + '<line x1="' + sx.toFixed(1) + '" y1="' + TOP + '" x2="' + sx.toFixed(1) + '" y2="' + (H - BOT)
      +   '" stroke="#dce6f0" stroke-width="1"/>'
      + '<circle cx="' + sx.toFixed(1) + '" cy="' + y(se.e).toFixed(1) + '" r="3.5" fill="#dce6f0"/>'
      + '</svg>';

    var safe = Math.ceil((hi + SET.clr) / 500) * 500;
    var sEl = $('#terrSafe');
    if (sEl){
      sEl.textContent = safe.toLocaleString() + '\'';
      sEl.classList.toggle('warn', AC.alt < safe);
    }
    var aEl = $('#terrAlt');
    if (aEl) aEl.textContent = AC.alt.toLocaleString() + '\'';

    var st = $('#terrStats');
    if (st) st.innerHTML =
        '<div><span class="k">At cursor</span><span class="v">' + se.e.toLocaleString() + '</span></div>'
      + '<div><span class="k">Cursor clr</span><span class="v' + ((AC.alt - se.e) < SET.clr ? ' warn' : '') + '">'
      +   Math.round(AC.alt - se.e).toLocaleString() + '</span></div>'
      + '<div><span class="k">Dist along</span><span class="v">' + (profScrub * T.nm).toFixed(1) + '</span></div>'
      + '<div><span class="k">Highest pt</span><span class="v">' + hi.toLocaleString() + '</span></div>'
      + '<div><span class="k">Clearance</span><span class="v' + ((AC.alt - hi) < SET.clr ? ' warn' : '') + '">'
      +   Math.round(AC.alt - hi).toLocaleString() + '</span></div>'
      + '<div><span class="k">At</span><span class="v">' + hiD.toFixed(1) + ' nm</span></div>';
  }

  /* ============================================================
     RADIO - frequencies in the order you will fly them
     Derived from the route. Aerodrome frequencies come from the live
     dataset. Enroute sectors are NOT modelled here: the panel shows
     the CNTR/RDO frequencies published at the adjoining fields and
     says so. In the real build this reads AIP ENR 2 sectors.
     ============================================================ */
  var FQ_ORDER = ['ATIS','APP','DEP','TWR','GND','MTAF','CTAF','RDO','CNTR'];
  function fqRank(d){
    var u = d.toUpperCase();
    for (var i = 0; i < FQ_ORDER.length; i++) if (u.indexOf(FQ_ORDER[i]) >= 0) return i;
    return 99;
  }
  function fqPrimary(d){
    var u = d.toUpperCase();
    return u.indexOf('TWR') >= 0 || u.indexOf('CTAF') >= 0 || u.indexOf('MTAF') >= 0;
  }
  function fqEnroute(fi){
    if (!fi) return [];
    return fi.freq.filter(function(r){
      var u = r[0].toUpperCase();
      return u.indexOf('CNTR') >= 0 || u.indexOf('RDO') >= 0;
    });
  }

  function radHTML(){
    if (ROUTE.length < 1) return '<div class="chipempty">No route. Build one in FPL.</div>';
    var h = '', T = totals();
    ROUTE.forEach(function(p, i){
      var fi = p.id ? FIELD_INFO[p.id] : null;
      var role = (i === 0) ? 'Departure' : (i === ROUTE.length - 1) ? 'Destination' : 'Enroute point';
      h += '<div class="fqp' + (i === toWpt ? ' act' : '') + '">'
        +  '<div class="fqh"><span class="ix">' + (i + 1) + '</span>'
        +  '<b>' + label(p) + '</b><span>' + role + '</span></div>';
      if (fi){
        fi.freq.slice().sort(function(a, b){ return fqRank(a[0]) - fqRank(b[0]); })
          .forEach(function(r){
            h += '<button class="fqr' + (fqPrimary(r[0]) ? ' pri' : '') + '" data-f="' + r[1] + '">'
               + '<span class="t">' + r[0] + '</span><span class="f">' + r[1] + '</span></button>';
          });
      } else {
        h += '<div class="fqnone">'
          +  (p.cat === 'strip' ? 'No published frequency &mdash; expect CTAF/MTAF, confirm before departure'
                                : 'No published frequency at this point') + '</div>';
      }
      h += '</div>';

      if (i < ROUTE.length - 1){
        var leg = T.legs[i];
        var en = fqEnroute(FIELD_INFO[p.id]).concat(fqEnroute(FIELD_INFO[ROUTE[i+1].id]));
        var seen = {}, uniq = [];
        en.forEach(function(r){ if (!seen[r[1]]){ seen[r[1]] = 1; uniq.push(r); } });
        h += '<div class="fqleg"><span class="d">' + (leg ? leg.nm.toFixed(0) + ' nm' : '') + '</span>'
          +  '<span class="e">' + (uniq.length
               ? uniq.map(function(r){ return r[0] + ' ' + r[1]; }).join('  \u00b7  ')
               : 'Enroute frequency not in this shell') + '</span></div>';
      }
    });
    return h + '<div class="cnote">Aerodrome frequencies are from the live NM Plotter dataset. '
      + 'Enroute entries are the CNTR/RDO frequencies published at the adjoining fields, not FIR '
      + 'sector boundaries &mdash; those come from AIP ENR 2 in the real build. '
      + 'Tap a frequency to copy it. Advisory only.</div>';
  }

  var wpt = $('#wptSheet'), wptW = wpt.querySelector('.tedw');
  function closeWpt(){ wpt.classList.remove('on'); wptW.classList.remove('tall'); }
  $('#wptClose').addEventListener('click', closeWpt);

  function openChip(i){
    var p = ROUTE[i];
    wptW.classList.remove('tall');
    $('#wptTitle').textContent = label(p);
    $('#wptTop').innerHTML = '';
    var rows = [
      ['dct',  'Direct to here'],
      ['ib',   'Insert point before'],
      ['ia',   'Insert point after'],
      ['up',   'Move up'],
      ['dn',   'Move down'],
      ['rm',   'Remove from route']
    ];
    $('#wptList').innerHTML = rows.map(function(r){
      return '<button class="wrow' + (r[0] === 'rm' ? ' danger' : '') + '" data-a="' + r[0] + '">' + r[1] + '</button>';
    }).join('');
    $$('#wptList .wrow').forEach(function(b){
      b.addEventListener('click', function(){
        var a = b.getAttribute('data-a');
        if (a === 'dct'){ toWpt = i; closeWpt(); drawFpl(); toast('Direct to ' + label(p)); return; }
        if (a === 'ib'){ closeWpt(); openAdd(i); return; }
        if (a === 'ia'){ closeWpt(); openAdd(i + 1); return; }
        if (a === 'up' && i > 0){ ROUTE.splice(i - 1, 0, ROUTE.splice(i, 1)[0]); }
        if (a === 'dn' && i < ROUTE.length - 1){ ROUTE.splice(i + 1, 0, ROUTE.splice(i, 1)[0]); }
        if (a === 'rm'){ ROUTE.splice(i, 1); if (toWpt >= ROUTE.length) toWpt = Math.max(0, ROUTE.length - 1); }
        closeWpt(); drawFpl();

    wptW.classList.add('tall');           /* fixed height: sheet must not move while filtering */
    $('#wptTop').innerHTML =
        '<div class="wsearch"><input id="wq" type="text" '
      + 'placeholder="ICAO, IATA, name, fix or village" '
      + 'autocapitalize="characters" autocorrect="off" spellcheck="false"></div>'
      + '<div class="wcoord">'

      +   '<input id="wLon" type="text" placeholder="E146 43.6">'
      +   '<button id="wAdd">Add</button>'
      + '</div>';

    function addPoint(p){
      ROUTE.splice(at, 0, { id:p.id, nm:p.nm, cat:p.cat, lat:p.lat, lon:p.lon });
      closeWpt(); drawFpl();
    }

    function list(q){
      q = (q || '').trim().toUpperCase();
      var h = '';

      /* a query that parses as a coordinate is offered directly */
      var cm = q.match(/^([NS]\s*\d[\d\s.\u00b0]*)[,/ ]+([EW]\s*\d[\d\s.\u00b0]*)$/);
      if (cm){
        var cla = parseDDM(cm[1], true), clo = parseDDM(cm[2], false);

  /* Accepts "S06 34.2", "S06°34.2'", "S0634.2", "S06". Without a
     separator the degrees are fixed width (2 for lat, 3 for lon), so
     "S0634.2" cannot be misread as 63 degrees. */
  function parseDDM(s, isLat){
    if (!s) return null;
    var t = String(s).trim().toUpperCase().replace(/[\u00b0'"]/g, ' ').replace(/\s+/g, ' ');
    var m = t.match(/^([NSEW]) ?(.+)$/);
    if (!m) return null;
    var sign = (m[1] === 'S' || m[1] === 'W') ? -1 : 1;
    if ((isLat && m[1] !== 'N' && m[1] !== 'S') || (!isLat && m[1] !== 'E' && m[1] !== 'W')) return null;
    var rest = m[2].trim(), dStr, mStr;
    if (rest.indexOf(' ') >= 0){
      var parts = rest.split(' ');
      dStr = parts[0]; mStr = parts[1] || '0';
    } else {
      var w = isLat ? 2 : 3;
      if (rest.length <= w){ dStr = rest; mStr = '0'; }
      else { dStr = rest.slice(0, w); mStr = rest.slice(w); }
    }
    if (!/^\d{1,3}$/.test(dStr) || !/^\d{1,2}(\.\d+)?$/.test(mStr)) return null;
    var mm = parseFloat(mStr);
    if (mm >= 60) return null;
    var v = parseInt(dStr, 10) + mm / 60;
    if (isLat && v > 90) return null;
    if (!isLat && v > 180) return null;
    return sign * v;
  }

  /* The window reads the live route. It must never show a point the

  function dmsStr(v, isLat){
    var h = isLat ? (v < 0 ? 'S' : 'N') : (v < 0 ? 'W' : 'E');
    var a = Math.abs(v), d = Math.floor(a);
    var mf = (a - d) * 60, m = Math.floor(mf), s = Math.round((mf - m) * 60);
    if (s === 60){ s = 0; m += 1; }
    if (m === 60){ m = 0; d += 1; }
    return h + ' ' + String(d).padStart(isLat ? 2 : 3, '0')
         + '\u00b0' + String(m).padStart(2, '0') + '\'' + String(s).padStart(2, '0') + '"';
  }
  function ddmStr(v, isLat){
    var h = isLat ? (v < 0 ? 'S' : 'N') : (v < 0 ? 'W' : 'E');
    var a = Math.abs(v), d = Math.floor(a), m = (a - d) * 60;
    if (m >= 59.995){ m = 0; d += 1; }
    return h + ' ' + String(d).padStart(isLat ? 2 : 3, '0')
         + '\u00b0' + (m < 10 ? '0' : '') + m.toFixed(2) + '\'';
  }

  function drawGps(){
    if (gpsIdx > ROUTE.length - 1) gpsIdx = Math.max(0, ROUTE.length - 1);

    }
    var p = ROUTE[gpsIdx], fn = (gpsFmt === 'dms') ? dmsStr : ddmStr;
    $('#gpsName').innerHTML = gpsRole(gpsIdx) + ' &middot; <b>' + label(p) + '</b>';
    $('#gpsLat').textContent = fn(p.lat, true);
    $('#gpsLon').textContent = fn(p.lon, false);
    $('#gpsLat').setAttribute('data-cp', fn(p.lat, true) + ' ' + fn(p.lon, false));
    $('#gpsLon').setAttribute('data-cp', fn(p.lat, true) + ' ' + fn(p.lon, false));
    $('#gpsProg').textContent = 'Point ' + (gpsIdx + 1) + ' of ' + ROUTE.length;
    $('#gpsTabs').innerHTML = ROUTE.map(function(x, i){
      return '<button data-i="' + i + '"' + (i === gpsIdx ? ' class="on"' : '') + '>'
           + '<span class="role">' + gpsRole(i) + '</span>'
           + '<span class="nm">' + (x.id || 'GPS') + '</span></button>';
    }).join('');
    $$('#gpsTabs button').forEach(function(b){
      b.addEventListener('click', function(){

      });

    wireCopy('#gpsOv');

  function rwyLenM(r){
    return Math.round(nmBetween({lat:r.e[0],lon:r.e[1]}, {lat:r.e[2],lon:r.e[3]}) * 1852);

  /* The four action slots on the card are user-assignable. Four is a
     hard ceiling: at 375px each slot gets ~94px and "Add to route"
     needs ~78 of that, so a fifth would start truncating labels. */
  var CARD_ACTS = {
    dct:  { t:'Direct to',    c:'var(--route)',    fld:false },

  };
  var ACTS_POOL = ['dct','add','ctr','copy','chart','freq','wx','ntm'];
  var ACTS_KEY = 'nmp.iphone.cardacts';
  var CARD_CFG = (function(){
    try{
      var a = JSON.parse(localStorage.getItem(ACTS_KEY));
      if (a && a.length === 4 && a.every(function(k){ return ACTS_POOL.indexOf(k) >= 0; })) return a;
    }catch(e){}
    return ['dct','add','ctr','chart'];
  })();
  function saveActs(){ try{ localStorage.setItem(ACTS_KEY, JSON.stringify(CARD_CFG)); }catch(e){} }

  var cardId = null, cardTab = 'info', cardSub = 'metar', cardFav = {};
  var CARD_TABS = [['info','Info'],['wx','Weather'],['rwy','Runway'],['proc','Procedure'],['ntm','NOTAM']];
  var WX_SUBS   = [['metar','METAR'],['taf','TAF'],['wind','Winds']];

  function dbById(id){ for (var i=0;i<DB.length;i++) if (DB[i].id === id) return DB[i]; return null; }
  var CAT_LABEL = { field:'Aerodrome', fix:'Enroute fix', strip:'Strip / village', mine:'My waypoint' };
  /* copy glyph, shown wherever a value can be tapped to copy */
  var CPI = '<svg class="cpi" viewBox="0 0 24 24" fill="none" stroke="currentColor" '
          + 'stroke-width="1.8" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/>'
          + '<path d="M15 5.6H6a1.6 1.6 0 0 0-1.6 1.6v9"/></svg>';
  var CAT_SHORT = { field:'RWY', fix:'FIX', strip:'STRIP', mine:'WPT' };

  /* ---- sun times: real NOAA calculation, PNG is UTC+10 ---- */
  function sunTimes(lat, lon, date){
    var rad = Math.PI / 180;
    var start = Date.UTC(date.getUTCFullYear(), 0, 0);
    var doy = Math.floor((date.getTime() - start) / 86400000);
    var g = 2 * Math.PI / 365 * (doy - 1 + 0.5);
    var eq = 229.18 * (0.000075 + 0.001868*Math.cos(g) - 0.032077*Math.sin(g)
           - 0.014615*Math.cos(2*g) - 0.040849*Math.sin(2*g));
    var dec = 0.006918 - 0.399912*Math.cos(g) + 0.070257*Math.sin(g)
            - 0.006758*Math.cos(2*g) + 0.000907*Math.sin(2*g)
            - 0.002697*Math.cos(3*g) + 0.00148*Math.sin(3*g);
    var c = Math.cos(90.833 * rad) / (Math.cos(lat*rad) * Math.cos(dec)) - Math.tan(lat*rad) * Math.tan(dec);
    if (c < -1 || c > 1) return null;
    var haDeg = Math.acos(c) / rad;
    return [720 - 4*(lon + haDeg) - eq, 720 - 4*(lon - haDeg) - eq];   /* minutes UTC */
  }
  function hhmmLocal(minUTC, offsetMin){
    var t = ((Math.round(minUTC + offsetMin) % 1440) + 1440) % 1440;
    return String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
  }

  /* ---- METAR helpers ---- */
  function wxCat(m){
    if (!m) return ['—','var(--text-fainter)'];
    var vis = 9999, bkn = 9999;
    var v = m.match(/\s(\d{4})\s/); if (v) vis = parseInt(v[1], 10);
    var c = m.match(/(BKN|OVC)(\d{3})/); if (c) bkn = parseInt(c[2], 10) * 100;
    if (vis < 1600 || bkn < 500)  return ['LIFR','#d65db1'];
    if (vis < 5000 || bkn < 1000) return ['IFR','var(--bad)'];
    if (vis < 8000 || bkn < 3000) return ['MVFR','#2b8cff'];
    return ['VFR','var(--good)'];
  }
  function metarWind(m){
    var w = m && m.match(/\s(\d{3}|VRB)(\d{2})(G\d{2})?KT/);
    if (!w) return null;
    return { dir: w[1] === 'VRB' ? null : parseInt(w[1], 10), kt: parseInt(w[2], 10) };
  }

  /* ---- tabs ---- */

      +    '<span class="v amb">' + ddm(f.lat, true) + '</span>' + CPI + '</button>'

        +  '<div class="kv"><span class="k">Sunset</span><span class="v">'  + hhmmLocal(st[1], 600) + ' LT</span></div>'
        +  '<div class="kv"><span class="k">Daylight</span><span class="v">' + hhmm((st[1]-st[0])/60) + '</span></div>';

        +  mine.map(function(n){
             return '<button class="row" data-cn="' + n.id + '"><b>' + esc(n.ttl || 'Untitled')
                  + '</b><span>' + noteAge(n.ts) + '</span></button>';
           }).join('')
        +  '<button class="add" data-cnadd="' + f.id + '">Add a note for ' + f.id + '</button>'
        +  '</div>';
    }

    h += '<div class="cnote">Coordinates, distance, bearing and sun times are computed. '
      +  (fi ? 'Elevation, runways and frequencies come from the live NM Plotter dataset. '
              + 'Weather, procedures and NOTAMs are demo placeholders in this shell. '
            : 'Coordinates for fixes, villages and personal waypoints are demo placeholders. ')
      +  'Not for navigation.</div>';

  }

  function cardWx(f, fi){
    if (!fi) return '<div class="cempty">Not in demo data</div>';
    if (cardSub === 'metar'){
      var cat = wxCat(fi.metar);
      return '<div class="metar"><div class="hdr">'
        + '<span class="dot" style="background:' + cat[1] + '"></span>'
        + '<span style="color:' + cat[1] + '">' + cat[0] + '</span>'
        + '<span class="age">14m ago</span></div>'
        + '<div class="raw" style="color:' + cat[1] + '">' + fi.metar + '</div>'
        + '<div class="csec">Decoded</div>'
        + kvWind(fi.metar)
        + '<div class="kv"><span class="k">Temp / dew</span><span class="v">'
        +   (fi.metar.match(/\s(M?\d{2})\/(M?\d{2})\s/) || [0,'—','—']).slice(1,3).join(' / ') + '</span></div>'
        + '<div class="kv"><span class="k">QNH</span><span class="v">'
        +   (fi.metar.match(/Q(\d{4})/) ? fi.metar.match(/Q(\d{4})/)[1] + ' hPa' : '—') + '</span></div>'
        + '</div>';
    }
    if (cardSub === 'taf'){
      return '<div class="metar"><div class="hdr"><span>TAF</span><span class="age">1h ago</span></div>'
        + '<div class="raw" style="color:var(--text-2)">' + fi.taf + '</div></div>';
    }
    var lv = [[2000,'090',12,18],[5000,'110',18,12],[10000,'130',24,6],[14000,'150',28,1]];
    var h = '<div class="csec">Forecast winds</div>';
    lv.forEach(function(r){
      h += '<div class="kv"><span class="k">' + r[0].toLocaleString() + '\'</span>'
         + '<span class="v">' + r[1] + '\u00b0 / ' + r[2] + ' kt &nbsp; ' + (r[3] > 0 ? '+' : '') + r[3] + '\u00b0C</span></div>';
    });
    return h + '<div class="cnote">Demo data.</div>';
  }
  function kvWind(m){
    var w = metarWind(m);
    return '<div class="kv"><span class="k">Wind</span><span class="v">'
      + (w ? (w.dir === null ? 'Variable' : String(w.dir).padStart(3,'0') + '\u00b0') + ' / ' + w.kt + ' kt' : '\u2014')
      + '</span></div>';
  }

  function cardRwy(f, fi){
    if (!fi) return '<div class="cempty">Not in demo data</div>';
    var w = metarWind(fi.metar), h = '';
    fi.rwy.forEach(function(r){
      var m = rwyLenM(r);
      h += '<div class="rwyc"><div class="rh"><b>' + r.l + '/' + r.h + '</b>'
        + '<span>' + r.b.toFixed(0) + '\u00b0 true</span></div>'
        + '<div class="rwyg">'
        + '<div><span class="k">Length</span><span class="v">' + m.toLocaleString() + ' m</span></div>'
        + '<div><span class="k">Feet</span><span class="v">' + Math.round(m * 3.28084).toLocaleString() + '</span></div>'
        + '<div><span class="k">Bearing</span><span class="v">' + r.b.toFixed(0) + '\u00b0</span></div>'
        + '</div>';
      if (w && w.dir !== null){
        h += '<div class="csec" style="margin-top:12px">Wind component</div><div class="rwyg">';
        [[r.l, r.b], [r.h, (r.b + 180) % 360]].forEach(function(end){
          var d = ((w.dir - end[1] + 540) % 360) - 180;
          var head = w.kt * Math.cos(d * Math.PI / 180);
          var cross = Math.abs(w.kt * Math.sin(d * Math.PI / 180));
          h += '<div><span class="k">Rwy ' + end[0] + '</span>'
             + '<span class="v ' + (head >= 0 ? 'ok' : 'warn') + '">'
             + (head >= 0 ? 'H' : 'T') + Math.abs(head).toFixed(0)
             + ' X' + cross.toFixed(0) + '</span></div>';
        });
        h += '</div>';
      }
      h += '</div>';
    });
    return h + '<div class="cnote">Runway data from the live NM Plotter dataset; lengths derived '
      + 'from threshold coordinates. H = headwind, T = tailwind, X = crosswind, from the demo METAR above.</div>';
  }

  function cardProc(f){
    var list = [
      ['Gov', f.id + ' Aerodrome chart'],
      ['Gov', f.id + ' RNAV (GNSS) approach'],
      ['Gov', f.id + ' Departure (RNAV)'],

      return '<button class="prow2"><span class="bdg">' + r[0] + '</span>'
        + '<span class="t2">' + r[1] + '</span><span class="go">Open</span></button>';
    }).join('') + '<div class="cnote">Demo list. Plate overlay is not wired in this shell.</div>';
  }

  function cardNtm(f){
    var n = [
      ['A0142/26', '21 JUL - 30 SEP', 'Runway lighting unserviceable. Night operations not authorised.'],
      ['A0138/26', '18 JUL - 25 JUL', 'Grass cutting adjacent runway edge, personnel and equipment on movement area during daylight hours.'],

        + '<p>' + r[2] + '</p></div>';

  /* ---- render ---- */
  function wireCopy(root){
    $$(root + ' [data-cp]').forEach(function(b){
      b.addEventListener('click', function(e){

        copyText(b.getAttribute('data-cp'), 'Position');

  function drawCard(){
    var f = cardAdHoc || dbById(cardId); if (!f) return;
    var fi = f.id ? FIELD_INFO[f.id] : null;
    $('#cardIcao').textContent = f.id || label(f);
    $('#cardName').textContent = f.nm;
    $('#cardStar').classList.toggle('on', !!(f.id && cardFav[f.id]));

    var inRoute = ROUTE.some(function(p){ return p.id === f.id; });
    $('#cardAct').innerHTML = CARD_CFG.filter(function(k){
      return fi || !CARD_ACTS[k].fld;      /* aerodrome-only actions drop out elsewhere */
    }).map(function(k){
      var a = CARD_ACTS[k];
      var label = (k === 'add' && inRoute) ? 'In route' : a.t;
      return '<button data-ca="' + k + '" style="color:' + a.c + '">' + label + '</button>';
    }).join('');

    /* Only aerodromes have weather, runways, procedures and NOTAMs. */
    if (!fi) cardTab = 'info';
    $('#cardTabs').classList.toggle('off', !fi);
    $('#cardTabs').innerHTML = !fi ? '' : CARD_TABS.map(function(t){
      return '<button data-ct="' + t[0] + '"' + (cardTab === t[0] ? ' class="on"' : '') + '>' + t[1] + '</button>';
    }).join('');

    var sub = $('#cardSub');
    sub.classList.toggle('off', cardTab !== 'wx');
    if (cardTab === 'wx'){
      sub.innerHTML = WX_SUBS.map(function(s){
        return '<button data-cs="' + s[0] + '"' + (cardSub === s[0] ? ' class="on"' : '') + '>' + s[1] + '</button>';
      }).join('');
    }

    $('#cardBody').innerHTML =
        cardTab === 'info' ? cardInfo(f, fi)
      : cardTab === 'wx'   ? cardWx(f, fi)
      : cardTab === 'rwy'  ? cardRwy(f, fi)
      : cardTab === 'proc' ? cardProc(f)
      :                      cardNtm(f);

    $$('#cardTabs button').forEach(function(b){
      b.addEventListener('click', function(){ cardTab = b.getAttribute('data-ct'); drawCard(); });
    });
    $$('#cardSub button').forEach(function(b){
      b.addEventListener('click', function(){ cardSub = b.getAttribute('data-cs'); drawCard(); });
    });
    $$('#cardAct button').forEach(function(b){
      b.addEventListener('click', function(){ cardAction(b.getAttribute('data-ca'), f); });
    });
    wireCopy('#cardBody');
    $$('#cardBody [data-cn]').forEach(function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); openNote(b.getAttribute('data-cn')); });
    });
    $$('#cardBody [data-cnadd]').forEach(function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); openNote(null, b.getAttribute('data-cnadd')); });
    });

    /* personal-waypoint editing */
    var delArmed = null;
    $$('#cardBody [data-wp]').forEach(function(el){
      var w = el.getAttribute('data-wp');

      if (w === 'name'){
        el.addEventListener('change', function(){
          var v = el.value.trim().toUpperCase();
          if (!v){ el.value = f.id; return; }
          if (v !== f.id && dbById(v)){ toast('A point called ' + v + ' already exists'); el.value = f.id; return; }
          var old = f.id;
          f.id = v; renameMine(old, v);
          if (cardId === old) cardId = v;
          saveMarks(); drawCard(); renderMap(); drawFpl();
          toast('Renamed to ' + v);
        });
      }

      if (w === 'lat' || w === 'lon'){
        el.addEventListener('change', function(){
          var isLat = (w === 'lat');
          var v = parseDDM(el.value, isLat);
          if (v === null){
            toast(isLat ? 'Use S06 34.2' : 'Use E146 43.6');
            el.value = ddm(isLat ? f.lat : f.lon, isLat);
            return;
          }
          if (isLat) f.lat = v; else f.lon = v;
          ROUTE.forEach(function(p){ if (p.id === f.id){ p.lat = f.lat; p.lon = f.lon; } });
          saveMarks(); drawCard(); renderMap(); drawFpl();
        });
      }

      if (w === 'here'){
        el.addEventListener('click', function(){
          f.lat = (VIEW.n + VIEW.s) / 2;
          f.lon = (VIEW.w + VIEW.e) / 2;
          ROUTE.forEach(function(p){ if (p.id === f.id){ p.lat = f.lat; p.lon = f.lon; } });
          saveMarks(); drawCard(); renderMap(); drawFpl();
          toast('Moved to ' + ddm(f.lat, true) + ' ' + ddm(f.lon, false));
        });
      }

      if (w === 'del'){
        el.addEventListener('click', function(){
          if (delArmed){
            clearTimeout(delArmed); delArmed = null;
            var gone = f.id;
            deleteMine(gone);
            card.classList.remove('on');
            renderMap(); drawFpl();
            toast(gone + ' deleted');
            return;
          }
          el.classList.add('arm');
          toast('Tap again to delete ' + f.id);
          delArmed = setTimeout(function(){ delArmed = null; el.classList.remove('arm'); }, 3000);

  function cardAction(a, f){

      }
      toWpt = at; drawFpl(); toast('Direct to ' + f.id);
      return;
    }
    if (a === 'add'){
      if (ROUTE.some(function(p){ return p.id === f.id; })){ toast(f.id + ' is already in the route'); return; }
      ROUTE.push({ id:f.id, nm:f.nm, cat:f.cat, lat:f.lat, lon:f.lon });
      drawFpl(); drawCard(); toast(f.id + ' added to route');
      return;
    }
    if (a === 'freq'){ cardTab = 'info'; drawCard();
      var s = $('#cardBody').querySelectorAll('.csec');
      if (s[2]) s[2].scrollIntoView({ block:'start', behavior:'smooth' });
      return;
    }
    if (a === 'ctr'){ card.classList.remove('on'); viewFit([f], 6); flashPoint(f); return; }
    if (a === 'chart'){ cardTab = 'proc'; drawCard(); return; }
    if (a === 'wx'){  cardTab = 'wx';  drawCard(); return; }
    if (a === 'ntm'){ cardTab = 'ntm'; drawCard(); return; }

  /* The demo map is a placeholder, so "Centre" drops a pulsing marker
     at the point's position within a PNG bounding box rather than
     pretending to pan a real map. */
  var PNG_BOX = { n:-1.5, s:-11.0, w:140.0, e:156.0 };   /* home extent */
  var VIEW = { n:PNG_BOX.n, s:PNG_BOX.s, w:PNG_BOX.w, e:PNG_BOX.e };
  var VIEW_MIN = 0.25, VIEW_MAX = 30;                   /* degrees of span */

  function viewZoom(f){
    var cy = (VIEW.n + VIEW.s) / 2, cx = (VIEW.w + VIEW.e) / 2;
    var hy = (VIEW.n - VIEW.s) / 2 * f, hx = (VIEW.e - VIEW.w) / 2 * f;
    if (hx * 2 < VIEW_MIN || hx * 2 > VIEW_MAX) return;
    VIEW.n = cy + hy; VIEW.s = cy - hy;
    VIEW.w = cx - hx; VIEW.e = cx + hx;
    renderMap();
  }
  function viewFit(pts, pad){
    if (!pts || !pts.length) return false;
    var n = -90, s = 90, w = 180, e = -180;
    pts.forEach(function(p){
      n = Math.max(n, p.lat); s = Math.min(s, p.lat);
      w = Math.min(w, p.lon); e = Math.max(e, p.lon);
    });
    var dy = Math.max(n - s, 0.4), dx = Math.max(e - w, 0.4);
    var span = Math.max(dy, dx * 0.62) * (1 + (pad === undefined ? 0.35 : pad));
    var cy = (n + s) / 2, cx = (w + e) / 2;
    VIEW.n = cy + span / 2; VIEW.s = cy - span / 2;
    VIEW.w = cx - span / 2 / 0.62; VIEW.e = cx + span / 2 / 0.62;
    renderMap();
    return true;
  }

  var cardFrac = (function(){
    try{ var v = parseFloat(localStorage.getItem(CARD_KEY)); if (v > 0.2 && v <= 1) return v; }catch(e){}
    return 0.66;
  })();
  function sizeCard(){
    cardMax = Math.max(CARD_MIN, window.innerHeight - 120);

  }
  (function(){
    var grip = $('#cardGrip');
    function begin(y0){
      var startH = card.getBoundingClientRect().height;
      grip.classList.add('on');
      function move(y){
        var h = Math.max(CARD_MIN, Math.min(cardMax, startH - (y - y0)));
        card.style.height = h + 'px';
        cardFrac = h / cardMax;
      }
      function tm(e){ e.preventDefault(); move(e.touches[0].clientY); }
      function mm(e){ move(e.clientY); }
      function end(){
        grip.classList.remove('on');
        try{ localStorage.setItem(CARD_KEY, String(cardFrac)); }catch(e){}
        document.removeEventListener('touchmove', tm);
        document.removeEventListener('touchend', end);
        document.removeEventListener('mousemove', mm);
        document.removeEventListener('mouseup', end);
      }
      document.addEventListener('touchmove', tm, { passive:false });
      document.addEventListener('touchend', end);
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', end);
    }
    grip.addEventListener('touchstart', function(e){ e.preventDefault(); begin(e.touches[0].clientY); }, { passive:false });

      noteEditing.ap = ap; noteEditing.ttl = ttl; noteEditing.txt = txt; noteEditing.ts = Date.now();
    } else {

  /* ---- Airports: nearest first, with the full list one tap away ---- */
  var npMode = 'near';
  function airportsHTML(){
    /* This view can be the opening tab, which runs before the map
       section has assigned VIEW and before search has loaded recents. */
    var V = (typeof VIEW !== 'undefined' && VIEW) ? VIEW
          : { n:-1.5, s:-11.0, w:140.0, e:156.0 };
    var rec = (typeof recents !== 'undefined' && recents) ? recents : [];
    var here = { lat:(V.n + V.s) / 2, lon:(V.w + V.e) / 2 };
    var modes = [['near','Nearest'],['all','All'],['fav','Favourites'],['rec','Recent']];

    var items = DB.filter(function(p){ return p.cat === 'field' || p.cat === 'strip'; });
    if (npMode === 'fav') items = items.filter(function(p){ return cardFav[p.id]; });
    if (npMode === 'rec') items = rec.map(dbById).filter(function(p){
      return p && (p.cat === 'field' || p.cat === 'strip');
    });

    items = items.map(function(p){
      return { p:p, d:nmBetween(here, p), b:trkBetween(here, p) };
    });
    if (npMode === 'near') items.sort(function(a, b){ return a.d - b.d; });
    if (npMode === 'all')  items.sort(function(a, b){ return a.p.id < b.p.id ? -1 : 1; });
    if (npMode === 'near') items = items.slice(0, 20);

    var h = '<div class="npseg">' + modes.map(function(m){
      return '<button data-np="' + m[0] + '"' + (npMode === m[0] ? ' class="on"' : '') + '>'
           + m[1] + '</button>';
    }).join('') + '</div>';

    if (!items.length){
      h += '<div class="cempty">' + (npMode === 'fav' ? 'No favourites yet \u2014 star a field on its card'
                                                       : 'Nothing here yet') + '</div>';
      return h;
    }

    items.forEach(function(it){
      var p = it.p, fi = FIELD_INFO[p.id];
      var dot = 'var(--text-fainter)';
      if (fi) dot = wxCat(fi.metar)[1];
      var rwy = fi ? (rwyLenM(fi.rwy[0]).toLocaleString() + ' m') : (p.cat === 'strip' ? 'Strip' : '\u2014');
      h += '<button class="nprow" data-ap="' + p.id + '">'
        +  '<span class="npdot" style="background:' + dot + '"></span>'
        +  '<span class="npid">' + p.id + '</span>'
        +  '<span class="npmid"><b>' + p.nm + '</b><span>' + rwy
        +    (fi && fi.iata ? ' \u00b7 ' + fi.iata : '') + '</span></span>'
        +  '<span class="npr"><b>' + it.d.toFixed(0) + '</b><span>'
        +    String(Math.round(it.b)).padStart(3, '0') + '\u00b0</span></span></button>';
    });
    return h + '<div class="cnote">Distance and bearing are from the centre of the map view. '
      + 'In the real build this is own-ship position. Green, blue or red dot is the parsed '
      + 'flight category where a METAR exists.</div>';
  }

  /* ============================================================
     QUICK FUEL CHECK  (ported from QuickFuelCheck 2026-06-16)
     ============================================================ */
  function fuelHTML(){
    function fld(lab, attrs){
      return '<div><span class="fsub">' + lab + '</span>'
           + '<input class="fin" type="number" inputmode="decimal" ' + attrs + '></div>';
    }
    return '<div class="vhead"><b>Quick Fuel Check</b><span class="sub">Jet A-1</span></div>'
      + '<div class="vbody">'
      + '<div class="fdens"><span class="k">Density &middot; kg/L</span>'
      +   '<input class="fin" data-f="dens" type="number" step="0.001" value="0.800" inputmode="decimal"></div>'

      + '<div class="fcard"><div class="flab">Unit converter</div><div class="fg2">'
      +   fld('Litres',    'data-u="L"')
      +   fld('US Gal',    'data-u="USG"')
      +   fld('Kilograms', 'data-u="kg"')
      +   fld('Pounds',    'data-u="lbs"')
      + '</div></div>'

      + '<div class="fcard"><div class="flab">Trip &rarr; required fuel</div><div class="fg3">'
      +   fld('Trip &middot; NM',  'data-f="trip" placeholder="270"')
      +   fld('TAS &middot; kt',   'data-f="tas"  placeholder="130"')
      +   fld('Burn &middot; kg/h','data-f="burn" placeholder="176"')
      + '</div>'
      + '<span class="fsub" style="margin-top:10px">Reserve &middot; min</span>'
      + '<div class="fseg" data-f="res"></div><div data-f="reqOut"></div></div>'

      + '<div class="fcard"><div class="flab">Endurance</div>'
      + '<span class="fsub">Fuel on board &middot; unit</span>'
      + '<div class="fseg" data-f="endU"></div>'
      + '<div class="fg2" style="margin-top:10px">'
      +   fld('Quantity',          'data-f="endQ" placeholder="800"')
      +   fld('Burn &middot; kg/h','data-f="endB" placeholder="176"')
      + '</div><div data-f="endOut"></div></div>'
      + '</div>';
  }

  function initFuel(root){
    var L_PER_USG = 3.78541, KG_PER_LB = 0.453592;
    var st = { density: 0.800, res: 15, endUnit: 'kg' };
    var q  = function(sel){ return root.querySelector(sel); };
    var qa = function(sel){ return Array.prototype.slice.call(root.querySelectorAll(sel)); };
    var f  = function(n, d){ return Number(n).toFixed(d === undefined ? 1 : d); };
    var num = function(sel){ return parseFloat(q(sel).value); };

    /* -- unit converter -- */
    var units = qa('input[data-u]');
    function convert(field, raw){
      var v = parseFloat(raw);
      if (raw === '' || isNaN(v)){
        units.forEach(function(i){ if (i.dataset.u !== field) i.value = ''; });
        return;
      }
      var L;
      if (field === 'L')   L = v;
      if (field === 'USG') L = v * L_PER_USG;
      if (field === 'kg')  L = v / st.density;
      if (field === 'lbs') L = (v * KG_PER_LB) / st.density;
      var vals = {
        L:   f(L, 1),
        USG: f(L / L_PER_USG, 2),
        kg:  f(L * st.density, 1),
        lbs: f((L * st.density) / KG_PER_LB, 1)
      };
      units.forEach(function(i){ if (i.dataset.u !== field) i.value = vals[i.dataset.u]; });
    }
    units.forEach(function(i){
      i.addEventListener('input', function(e){ convert(e.target.dataset.u, e.target.value); });
    });

    /* -- density -- */
    q('[data-f="dens"]').addEventListener('input', function(e){
      st.density = parseFloat(e.target.value) || 0.800;
      units.forEach(function(i){ i.value = ''; });
      req(); end();
    });

    /* -- trip -> required fuel -- */
    function req(){
      var t = num('[data-f="trip"]'), v = num('[data-f="tas"]'), b = num('[data-f="burn"]');
      var out = q('[data-f="reqOut"]');
      if (!(t > 0 && v > 0 && b > 0)){
        out.innerHTML = '<div class="fnone">Enter trip, TAS and burn</div>'; return;
      }
      var hr = t / v, trip = hr * b, resKg = b * (st.res / 60), tot = trip + resKg;
      var h = Math.floor(hr), m = Math.round((hr - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      out.innerHTML = '<div class="fout">'
        + '<div class="r"><span>Flight time</span><span>' + h + 'h ' + String(m).padStart(2,'0') + 'm</span></div>'
        + '<div class="r"><span>Reserve</span><span>' + (st.res === 0 ? 'NIL' : f(resKg,1) + ' kg') + '</span></div>'
        + '<div class="big">' + f(tot,0) + '<u>kg</u></div>'
        + '<div class="alt">' + f(tot/st.density,0) + ' L &middot; '
        + f((tot/st.density)/L_PER_USG,1) + ' USG</div></div>';
    }
    ['trip','tas','burn'].forEach(function(k){
      q('[data-f="' + k + '"]').addEventListener('input', req);
    });

    /* -- reserve segmented control -- */
    var RES = [0,15,20,30,45,60], resHost = q('[data-f="res"]');
    resHost.innerHTML = RES.map(function(r){
      return '<button data-r="' + r + '"' + (r === st.res ? ' class="on"' : '') + '>'
           + (r === 0 ? 'NIL' : r) + '</button>';
    }).join('');
    Array.prototype.forEach.call(resHost.children, function(b){
      b.addEventListener('click', function(){
        st.res = parseInt(b.getAttribute('data-r'), 10);
        Array.prototype.forEach.call(resHost.children, function(x){ x.classList.toggle('on', x === b); });
        req();
      });
    });

    /* -- endurance -- */
    var UNITS = ['kg','L','USG','lbs'], endHost = q('[data-f="endU"]');
    function toKg(v, u){
      if (u === 'lbs') return v * KG_PER_LB;
      if (u === 'L')   return v * st.density;
      if (u === 'USG') return v * L_PER_USG * st.density;
      return v;
    }
    endHost.innerHTML = UNITS.map(function(u){
      return '<button data-eu="' + u + '"' + (u === st.endUnit ? ' class="on"' : '') + '>' + u + '</button>';
    }).join('');
    Array.prototype.forEach.call(endHost.children, function(b){
      b.addEventListener('click', function(){
        st.endUnit = b.getAttribute('data-eu');
        Array.prototype.forEach.call(endHost.children, function(x){ x.classList.toggle('on', x === b); });
        end();
      });
    });
    function end(){
      var v = num('[data-f="endQ"]'), b = num('[data-f="endB"]');
      var out = q('[data-f="endOut"]');
      if (!(v > 0 && b > 0)){
        out.innerHTML = '<div class="fnone">Enter fuel on board and burn</div>'; return;
      }
      var kg = toKg(v, st.endUnit), hrs = kg / b;
      var h = Math.floor(hrs), m = Math.round((hrs - h) * 60);
      if (m === 60){ h += 1; m = 0; }
      out.innerHTML = '<div class="fout">'
        + '<div class="r"><span>Fuel on board</span><span>' + f(kg,1) + ' kg</span></div>'
        + '<div class="big">' + h + '<u>h</u> ' + String(m).padStart(2,'0') + '<u>m</u></div>'
        + '<div class="alt">at ' + f(b,0) + ' kg/hr</div></div>';
    }
    ['endQ','endB'].forEach(function(k){
      q('[data-f="' + k + '"]').addEventListener('input', end);
    });

    req(); end();
  }

  renderTabs();
  showView(activeTab);

  /* ============================================================
     SEARCH
     Same matcher as the FPL point picker. Every result opens the
     card, so a fix or a village gets Direct-to and Add-to-route
     exactly like an aerodrome.

  var sPanel = $('#searchPanel'), sIn = $('#searchIn'), sBox = $('#search');
  var REC_KEY = 'nmp.iphone.recents';
  function loadRec(){
    try{ var a = JSON.parse(localStorage.getItem(REC_KEY)); if (a && a.length) return a; }catch(e){}
    return [];
  }
  var recents = loadRec();
  function pushRec(id){
    recents = [id].concat(recents.filter(function(x){ return x !== id; })).slice(0, 8);
    try{ localStorage.setItem(REC_KEY, JSON.stringify(recents)); }catch(e){}
  }

  function sizeSearch(){
    var top  = $('#chrome').getBoundingClientRect().bottom;
    var tabH = document.querySelector('.tabs').getBoundingClientRect().height;
    sPanel.style.top = top + 'px';
    sPanel.style.height = Math.max(200, window.innerHeight - top - tabH) + 'px';

  function searchRows(items, heading){
    var h = heading ? '<div class="wsec">' + heading + '</div>' : '';
    items.forEach(function(p){
      h += '<button class="wrow" data-sid="' + p.id + '">'
         + '<span class="id">' + p.id + '</span>'
         + '<span class="nm2">' + p.nm + '</span>'
         + '<span class="cat">' + (p.ia || CAT_SHORT[p.cat] || '') + '</span></button>';
    });
    return h;
  }

  function drawSearch(){
    var q = sIn.value.trim().toUpperCase(), h = '';
    $('#searchX').classList.toggle('on', !!q);

    if (!q){
      if (recents.length){
        var rs = recents.map(dbById).filter(Boolean);
        if (rs.length) h += searchRows(rs, 'Recent');
      }
      h += searchRows(DB.filter(function(p){ return p.cat === 'field'; }).slice(0, 8), 'Fields');
      $('#searchList').innerHTML = h;
      wireSearchRows();
      return;
    }

    var cm = q.match(/^([NS]\s*\d[\d\s.\u00b0]*)[,/ ]+([EW]\s*\d[\d\s.\u00b0]*)$/);
    if (cm){
      var la = parseDDM(cm[1], true), lo = parseDDM(cm[2], false);
      if (la !== null && lo !== null){
        h += '<div class="wsec">Coordinate</div>'
           + '<button class="wrow" data-scoord="' + la + ',' + lo + '">'
           + '<span class="id">GPS</span>'
           + '<span class="nm2">' + ddm(la, true) + ' ' + ddm(lo, false) + '</span>'
           + '<span class="cat">Open</span></button>';
      }
    }

    var hits = DB.filter(function(p){
      return (p.id && p.id.toUpperCase().indexOf(q) >= 0)
          || (p.ia && p.ia.toUpperCase().indexOf(q) === 0)
          || (p.nm && p.nm.toUpperCase().indexOf(q) >= 0);
    });
    CAT_ORDER.forEach(function(c){
      var inCat = hits.filter(function(p){ return p.cat === c; });
      if (inCat.length) h += searchRows(inCat, CAT_NM[c]);
    });
    if (!h) h = '<div class="chipempty">No match for &ldquo;' + q + '&rdquo;</div>';
    $('#searchList').innerHTML = h;
    wireSearchRows();
  }

  function wireSearchRows(){
    $$('#searchList .wrow').forEach(function(b){
      b.addEventListener('click', function(){
        var cd = b.getAttribute('data-scoord');
        if (cd){
          var pr = cd.split(',');
          closeSearch();
          openCardPoint({ id:null, nm:'Coordinate', cat:'mine',
                          lat:parseFloat(pr[0]), lon:parseFloat(pr[1]) });
          return;
        }
        var id = b.getAttribute('data-sid');
        pushRec(id);
        closeSearch();
        openCard(id);
      });
    });
  }

  /* ============================================================

  }
  function segCtrl(name, opts, cur){
    return '<span class="fseg" data-seg="' + name + '">' + opts.map(function(o){
      return '<button data-v="' + o[0] + '"' + (String(o[0]) === String(cur) ? ' class="on"' : '')
           + '>' + o[1] + '</button>';
    }).join('') + '</span>';
  }
  function inCtrl(name, val){
    return '<input class="fin" data-set="' + name + '" type="text" inputmode="decimal" value="' + val + '">';
  }
  function swiCtrl(name, on){
    return '<span class="swi' + (on ? ' on' : '') + '" data-swi="' + name + '"><i></i></span>';
  }

  function drawSet(){
    $('#setBody').innerHTML =
        '<div class="csec" style="margin-top:0">Aircraft</div>'
      + setRow('Registration', null, '<input class="fin" data-set="reg" type="text" value="' + AC.reg + '">')
      + setRow('Type', null, '<input class="fin" data-set="type" type="text" value="' + AC.type + '">')
      + setRow('Cruise TAS', 'kt', inCtrl('tas', AC.tas))
      + setRow('Fuel burn', 'kg per hour', inCtrl('burn', AC.burn))
      + setRow('Fuel on board', 'kg', inCtrl('fob', AC.fob))
      + setRow('Reserve', 'minutes', segCtrl('resMin', [[15,'15'],[30,'30'],[45,'45'],[60,'60']], AC.resMin))

      + '<div class="csec">Flight plan</div>'
      + setRow('Cruise altitude', 'feet', inCtrl('alt', AC.alt))
      + setRow('ETD', 'UTC, hhmm', '<input class="fin" data-set="etd" type="text" inputmode="numeric" value="' + etdStr() + '">')
      + setRow('Low clearance warning', 'NavLog and Profile turn red below this',
               segCtrl('clr', [[500,'500'],[1000,'1000'],[1500,'1500']], SET.clr))

      + '<div class="csec">Map</div>'
      + setRow('Airfield labels', 'declutter', segCtrl('labels', [['off','Off'],['auto','Auto'],['always','Always']], SET.labels))

      + '<div class="csec">Units</div>'
      + setRow('Coordinate format', 'default for the GPS window',
               segCtrl('coordFmt', [['ddm', "D\u00b0M.M'"], ['dms', 'D\u00b0M\u2032S\u2033']], SET.coordFmt))

      + '<div class="csec">Layout</div>'
      + '<button class="setgo" data-go2="tabs">Edit bottom bar<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="acty">Edit activity bar<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="rail">Edit layer rail<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="acts">Edit card actions<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="type">Type scale<span class="ch">\u203a</span></button>'
      + '<button class="setgo" data-go2="metrics">Layout metrics<span class="ch">\u203a</span></button>'

      + '<div class="csec">About</div>'
      + setRow('Version', BUILD, '<span style="font-family:var(--mono);color:var(--accent)">' + VERSION + '</span>')
      + '<div class="cnote">NM Plotter is advisory only and is a backup to the certified '
      + 'avionics. Garmin remains primary at all times. Every data layer carries its AIP '
      + 'edition date. Not for navigation.</div>';

    $$('#setBody input[data-set]').forEach(function(el){
      el.addEventListener('change', function(){
        var k = el.getAttribute('data-set'), v = el.value;
        if (k === 'reg' || k === 'type'){ AC[k] = v.trim() || AC[k]; }
        else if (k === 'etd'){
          var m = String(v).replace(/\D/g, '').padStart(4, '0').slice(0, 4);
          var hh = parseInt(m.slice(0, 2), 10), mm = parseInt(m.slice(2), 10);
          if (hh < 24 && mm < 60) ETD_MIN = hh * 60 + mm; else toast('ETD must be 0000-2359');
        }
        else AC[k] = snum(v, AC[k]);
        saveSet(); drawSet(); drawFpl();
      });
    });
    $$('#setBody .fseg').forEach(function(g){
      var name = g.getAttribute('data-seg');
      Array.prototype.forEach.call(g.children, function(b){
        b.addEventListener('click', function(){
          var v = b.getAttribute('data-v');
          if (name === 'resMin')      AC.resMin = parseInt(v, 10);
          else if (name === 'clr')    SET.clr = parseInt(v, 10);
          else { SET[name] = v; if (name === 'coordFmt') gpsFmt = v; }
          saveSet(); drawSet(); drawFpl(); renderMap();
        });
      });
    });
    $$('#setBody .swi').forEach(function(s){
      s.addEventListener('click', function(){
        SET[s.getAttribute('data-swi')] = !SET[s.getAttribute('data-swi')];
        saveSet(); drawSet(); renderMap();
      });
    });
    $$('#setBody .setgo').forEach(function(b){
      b.addEventListener('click', function(){
        var k = b.getAttribute('data-go2');
        closeSet();
        if (k === 'tabs')    openEd();
        if (k === 'acty')    openActEd();
        if (k === 'rail')    openRailEd();
        if (k === 'acts')    openActsEd();
        if (k === 'type')    openType();
        if (k === 'metrics') showMetrics();
      });
    });
  }

  function openSet(){ closeAll(); drawSet(); setV.classList.add('on'); }
  function closeSet(){ setV.classList.remove('on'); }
  $('#setClose').addEventListener('click', closeSet);

  /* ---------- misc stubs ---------- */
  $('#tbSet').addEventListener('click', openSet);


  /* ---------- Track my position: Off -> Centre -> Follow ---------- */
  var LOC_STATES = ['Off', 'Centred', 'Follow \u00b7 track up'];
  var locState = 0;
  $('#tbLoc').addEventListener('click', function(){
    locState = (locState + 1) % LOC_STATES.length;
    $('#tbLoc').classList.toggle('on', locState > 0);
    toast('Own position: ' + LOC_STATES[locState]);
  });

  /* ---------- Layout metrics overlay ---------- */
  var mxOn = false;
  function showMetrics(){
    var mx = $('#mx');
    if (mxOn){ mx.classList.remove('on'); mx.innerHTML = ''; mxOn = false; return; }
    var bands = [
      ['#chrome',  'top chrome'],
      ['#map',     'map'],
      ['#acty',    'activity bar'],
      ['.tabs',    'tab bar']
    ];
    var h = '';
    bands.forEach(function(b){
      var el = $(b[0]); if (!el) return;
      var r = el.getBoundingClientRect();
      h += '<div class="mxb" style="top:' + Math.round(r.top) + 'px;height:' + Math.round(r.height) + 'px"></div>'
         + '<div class="mxl" style="top:' + (Math.round(r.top) + 3) + 'px">'
         + b[1] + ' ' + Math.round(r.height) + 'px</div>';
    });
    var sat = getComputedStyle(document.documentElement).getPropertyValue('--sat');
    h += '<div class="mxl" style="top:3px;left:6px;right:auto">viewport '
       + window.innerWidth + '\u00d7' + window.innerHeight
       + ' \u00b7 safe-top ' + sat.trim() + ' \u00b7 ' + VERSION + '</div>';
    mx.innerHTML = h;
    mx.classList.add('on');
    mxOn = true;
    setTimeout(function(){ mx.classList.remove('on'); mx.innerHTML = ''; mxOn = false; }, 6000);
  }

  /* ============================================================
     MAP LAYERS
     The map is a placeholder, but the layer wiring is real: markers
     are projected from the same DB the search and FPL use, so every
     toggle changes what is actually drawn.
     ============================================================ */
  var LAYERS = {
    base:'png', terrain:false,
    fields:true, strips:false, fixes:false, mine:true,
    route:true, airspace:false, danger:false, wxcat:false
  };
  var LAY_KEY = 'nmp.iphone.layers';
  (function(){
    try{ var s = JSON.parse(localStorage.getItem(LAY_KEY));
         if (s) for (var k in s) if (k in LAYERS) LAYERS[k] = s[k]; }catch(e){}
  })();
  function saveLayers(){ try{ localStorage.setItem(LAY_KEY, JSON.stringify(LAYERS)); }catch(e){} }

  /* One place defines each layer's name and glyph. The rail, the
     popover and the rail editor all read from here. */
  var LAYER_META = {
    fields: { t:'Airports',
      d:'<path d="M12 4l8 15H4z"/>' },
    strips: { t:'Strips &amp; villages',
      d:'<circle cx="12" cy="12" r="3.2"/><path d="M12 4.4v2M12 17.6v2M4.4 12h2M17.6 12h2"/>' },
    fixes:  { t:'Enroute fixes',
      d:'<path d="M12 3.2l2.3 6.5 6.5 2.3-6.5 2.3-2.3 6.5-2.3-6.5L3.2 12l6.5-2.3z"/>' },
    mine:   { t:'My waypoints',
      d:'<path d="M12 21.2s6.4-5.9 6.4-10.6a6.4 6.4 0 1 0-12.8 0C5.6 15.3 12 21.2 12 21.2z"/><circle cx="12" cy="10.4" r="2.2"/>' },
    route:  { t:'Active route',
      d:'<circle cx="5" cy="18" r="2.4"/><circle cx="19" cy="6" r="2.4"/><path d="M6.9 16.3L17.1 7.7"/>' },
    airspace:{ t:'Controlled airspace',
      d:'<path d="M12 3.4l7.4 4.3v8.6L12 20.6 4.6 16.3V7.7z"/>' },
    danger: { t:'Danger &amp; restricted',
      d:'<path d="M12 3.6L21 19.4H3z"/><path d="M12 10v4.2"/><circle cx="12" cy="16.8" r=".9" fill="currentColor" stroke="none"/>' },
    wxcat:  { t:'Flight category',
      d:'<circle cx="12" cy="12" r="7.6"/><path d="M12 4.4v15.2"/>' },
    terrain:{ t:'Terrain shading',
      d:'<path d="M3 19l6-9 4 5.5 2.5-3.5L21 19z"/>' },
    labels: { t:'Labels',
      d:'<path d="M4.6 12.4l7-7.4h7.8v7.8l-7.4 7z"/><circle cx="16" cy="8" r="1.4"/>' },
    navaid: { t:'Navaids', d:'<circle cx="12" cy="12" r="6.4"/><circle cx="12" cy="12" r="1.6"/>' },
    proc:   { t:'Procedure fixes', d:'<path d="M12 4.4l6 13H6z"/>' }
  };
  function laySvg(k){
    var m = LAYER_META[k]; if (!m) return '';
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" '
         + 'stroke-linejoin="round" stroke-linecap="round">' + m.d + '</svg>';
  }
  function layOn(k){ return (k === 'labels') ? (SET.labels !== 'off') : !!LAYERS[k]; }
  function layToggle(k){
    if (k === 'labels'){
      if (SET.labels === 'off') SET.labels = lastLabelMode;
      else { lastLabelMode = SET.labels; SET.labels = 'off'; }
      saveSet();
    } else {
      LAYERS[k] = !LAYERS[k];
      saveLayers();
    }
  }

  var RAIL_KEY = 'nmp.iphone.rail';
  var RAIL_POOL = ['fields','strips','fixes','mine','route','airspace','danger','wxcat','terrain','labels'];
  var RAIL_CFG = (function(){
    try{
      var a = JSON.parse(localStorage.getItem(RAIL_KEY));
      if (a && a.length === 5 && a.every(function(k){ return RAIL_POOL.indexOf(k) >= 0; })) return a;
    }catch(e){}
    return ['fields','airspace','mine','route','terrain'];
  })();
  function saveRail(){ try{ localStorage.setItem(RAIL_KEY, JSON.stringify(RAIL_CFG)); }catch(e){} }

  var BASES = [
    ['png',   'PNG vector (offline)'],
    ['carto', 'CARTO dark'],
    ['sat',   'Satellite']
  ];
  /* Left column: the map itself - basemap choice plus the two
     treatments that change how the map is drawn rather than what
     data sits on it. Right column: data layers. */
  var MAP_OVERLAYS = ['terrain', 'labels'];
  var OVERLAYS = [
    ['fields', true], ['strips', true], ['fixes',  true], ['mine',  true],
    ['route',  true], ['airspace', true], ['danger', true], ['wxcat',  true],
    ['navaid', false], ['proc',  false]
  ];
  var lastLabelMode = (SET.labels === 'off') ? 'auto' : SET.labels;

  /* Demo geometry: boxes in degrees, shape only, NOT AIP data.
     The real build reads PNG_CTA / PNG_TMA_SECTORS and the ENR 5.1
     danger and restricted area coordinates. */
  var AIRSPACE = [
    { id:'PY TMA',  n:-9.05, s:-9.90, w:146.70, e:147.80 },
    { id:'NZ CTR',  n:-6.30, s:-6.85, w:146.40, e:147.05 },
    { id:'MH CTR',  n:-5.55, s:-6.10, w:144.00, e:144.60 }
  ];
  var DANGER = [
    { id:'D-AYD903', n:-6.20, s:-6.95, w:146.30, e:147.20 },
    { id:'R-AYR921', n:-9.20, s:-9.75, w:146.90, e:147.60 }
  ];

  function projX(lon){ return (lon - VIEW.w) / (VIEW.e - VIEW.w) * 100; }
  function projY(lat){ return (VIEW.n - lat) / (VIEW.n - VIEW.s) * 100; }

  function renderMap(){
    var map = $('#map'), host = $('#mapLayers');
    if (!map || !host) return;

    map.classList.remove('base-png','base-carto','base-sat');
    map.classList.add('base-' + LAYERS.base);
    $('#terrOv').classList.toggle('on', !!LAYERS.terrain);

    var h = '';

    function box(cls, a){
      var l = projX(a.w), t = projY(a.n);
      return '<div class="' + cls + '" style="left:' + l.toFixed(2) + '%;top:' + t.toFixed(2)
           + '%;width:' + (projX(a.e) - l).toFixed(2) + '%;height:' + (projY(a.s) - t).toFixed(2)
           + '%"><b>' + a.id + '</b></div>';
    }
    if (LAYERS.airspace) AIRSPACE.forEach(function(a){ h += box('asp', a); });
    if (LAYERS.danger)   DANGER.forEach(function(a){ h += box('dgr', a); });

    if (LAYERS.route && ROUTE.length > 1){
      var rect = map.getBoundingClientRect();
      for (var i = 0; i < ROUTE.length - 1; i++){
        var a = ROUTE[i], b = ROUTE[i+1];
        var ax = projX(a.lon) / 100 * rect.width, ay = projY(a.lat) / 100 * rect.height;
        var bx = projX(b.lon) / 100 * rect.width, by = projY(b.lat) / 100 * rect.height;
        var dx = bx - ax, dy = by - ay;
        h += '<div class="leg" style="left:' + ax.toFixed(1) + 'px;top:' + ay.toFixed(1)
          +  'px;width:' + Math.sqrt(dx*dx + dy*dy).toFixed(1) + 'px;transform:rotate('
          +  (Math.atan2(dy, dx) * 180 / Math.PI).toFixed(2) + 'deg)"></div>';
      }
    }

    var show = { field:LAYERS.fields, strip:LAYERS.strips, fix:LAYERS.fixes, mine:LAYERS.mine };
    DB.forEach(function(p){
      if (!show[p.cat]) return;
      var x = projX(p.lon), y = projY(p.lat);
      if (x < -2 || x > 102 || y < -2 || y > 102) return;
      var tint = '';
      if (LAYERS.wxcat && p.cat === 'field'){
        var fi = FIELD_INFO[p.id];
        if (fi) tint = 'background:' + wxCat(fi.metar)[1] + ';';
      }
      var lab = (SET.labels === 'off') ? ''
              : '<b' + (SET.labels === 'auto' ? ' style="opacity:.75"' : '') + '>' + p.id + '</b>';
      h += '<div class="fld k-' + p.cat + '" data-fld="' + p.id + '" style="left:' + x.toFixed(2)
        +  '%;top:' + y.toFixed(2) + '%"><i' + (tint ? ' style="' + tint + '"' : '') + '></i>'
        +  lab + '</div>';
    });

    host.innerHTML = h;
    $$('#mapLayers .fld').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        openCard(el.getAttribute('data-fld'));
      });
    });
  }

  /* ---------- Layers popover, generated from the model ---------- */
  function drawLayersPop(){
    var tick = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" '
             + 'stroke-linejoin="round"><path d="M4 12.5l5 5 11-11"/></svg>';
    var l = '';
    BASES.forEach(function(b){
      l += '<div class="prow' + (LAYERS.base === b[0] ? ' sel' : '') + '" data-base="' + b[0] + '">'
        +  b[1] + '</div>';
    });
    l += '<div class="psec">Overlays</div>';
    MAP_OVERLAYS.forEach(function(k){
      l += '<div class="prow" data-mov="' + k + '">'
        +  '<span class="ck">' + (layOn(k) ? tick : '') + '</span>'
        +  LAYER_META[k].t + '</div>';
    });
    $('#popL').innerHTML = l;

    var r = '';
    OVERLAYS.forEach(function(o){
      var k = o[0], ok = o[1];
      r += '<div class="prow" data-ov="' + k + '"' + (ok ? '' : ' style="opacity:.4"') + '>'
        +  '<span class="ck">' + (ok && layOn(k) ? tick : '') + '</span>' + LAYER_META[k].t
        +  (ok ? '' : '<span style="margin-left:auto;font-size:var(--t-2xs);color:var(--text-fainter)">no data</span>')
        +  '</div>';
    });
    $('#popR').innerHTML = r;

    $$('#popL .prow').forEach(function(el){
      el.addEventListener('click', function(){
        var b = el.getAttribute('data-base'), mo = el.getAttribute('data-mov');
        if (b) LAYERS.base = b;
        else if (mo) layToggle(mo);
        saveLayers(); drawLayersPop(); renderMap(); syncRail();
      });
    });
    $$('#popR .prow').forEach(function(el){
      el.addEventListener('click', function(){
        var k = el.getAttribute('data-ov');
        var ok = false;
        OVERLAYS.forEach(function(o){ if (o[0] === k) ok = o[1]; });
        if (!ok){ toast('No data for this layer in the demo shell'); return; }
        layToggle(k);
        drawLayersPop(); renderMap(); syncRail();
      });
    });
  }

  window.addEventListener('resize', renderMap);
  drawLayersPop();
  buildRail();
  renderMap();

})();
</script>
</body>
</html>
